version: "3"

tasks:
  1password:
    desc: "Connect to 1Password and create a secret for the external-secrets operator"
    cmds: |-
      op connect server create kubernetes --vaults kubernetes
      export OP_CONNECT_TOKEN=$(op connect token create "external-secret-operator" --server kubernetes --vault kubernetes)
      # IMPORTANT: do NOT pre-base64 the credentials file. kubectl create secret
      # already base64-encodes secret data values; pre-encoding produces a
      # double-encoded value, and Connect then sees raw base64 (starting with
      # 'e') instead of JSON and fails with "invalid character 'e' looking for
      # beginning of value", which silently breaks every ExternalSecret in the
      # cluster. Use --from-file (or unencoded literal) so the file content
      # mounted in the Connect pod is the raw JSON.
      kubectl create secret generic op-credentials \
        -n 1password \
        --from-literal=token="$OP_CONNECT_TOKEN" \
        --from-file=1password-credentials.json=1password-credentials.json
