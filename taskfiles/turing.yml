version: '3'

# Retired in nostos v0.3 (Stream B1). Every recipe here bypassed the
# secrets pipeline and would silently misconfigure a Turing-Pi node.
# All flows are now owned by `task nostos:install NODE=<name>`.

tasks:
  flash:
    desc: "[deprecated] use 'task nostos:install NODE=tp1'"
    cmds:
      - 'echo "deprecated: use ''task nostos:install NODE=<name>''" >&2'
      - exit 1

  download:
    desc: "[deprecated] image download is owned by nostos image cache"
    cmds:
      - 'echo "deprecated: use ''task nostos:install NODE=<name>''" >&2'
      - exit 1

  get:
    desc: "[deprecated] use 'tpi uart get -n <slot>' directly"
    cmds:
      - 'echo "deprecated: use ''task nostos:install NODE=<name>''" >&2'
      - exit 1

  install-talos:
    desc: "[deprecated] use 'task nostos:install NODE=tp1'"
    cmds:
      - 'echo "deprecated: use ''task nostos:install NODE=<name>''" >&2'
      - exit 1
