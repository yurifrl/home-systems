# Talos machineconfig TEMPLATE for vm01 (VMware Fusion VM, arm64, Apple Silicon)
# Role: worker. Boot the VM from the Talos arm64 ISO, then:
#   talosctl apply-config --insecure -n <vm-ip> -f nostos/state/configs/vm01.yaml
#
# EDIT BEFORE RENDER:
#   - every 192.168.68.120   -> the static IP you assign the VM
#   - install.disk           -> the VM's disk (Fusion virtio = /dev/vda, SATA = /dev/sda)
version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: ""
  certSANs: []
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
  network:
    hostname: vm01
    interfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - 192.168.68.120/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
    nameservers:
      - 192.168.68.1
      - 8.8.8.8
  install:
    disk: /dev/vda
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  controlPlane:
    endpoint: https://192.168.68.100:6443
  clusterName: talos-default
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: ""
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=vm01
  - TS_EXTRA_ARGS=--accept-routes
  - TS_ROUTES=10.96.0.0/12,192.168.68.0/24
