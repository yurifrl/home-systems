# Talos machineconfig TEMPLATE for rpi01 (Raspberry Pi 4, arm64)
# Role: control plane + worker at 192.168.0.170
version: v1alpha1
debug: false
persist: true

machine:
  type: controlplane
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: "op://kubernetes/talos/MACHINE_CA_KEY"
  certSANs:
    - 192.168.0.170
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    # Register with the LAN IP, never the Tailscale IP — otherwise pod->Service
    # VIP traffic gets DNAT'd to the TS IP and dropped by Tailscale netfilter
    # (pods aren't TS-authorized sources). Mirrors dell01.
    nodeIP:
      validSubnets:
        - 192.168.0.0/24
    # Bind-mount the Longhorn data dir into the kubelet container so Longhorn
    # pods can access the USB data disk mounted at /var/mnt/storage. Mirrors tp1.
    extraMounts:
      - destination: /var/mnt/storage
        type: bind
        source: /var/mnt/storage
        options:
          - bind
          - rshared
          - rw
  network:
    hostname: rpi01
    interfaces:
      # Match the NIC by its permanent MAC, NOT a kernel name. On this Pi 4 the
      # onboard ethernet enumerates as `end0` (not `eth0`); a hardcoded `eth0`
      # silently failed to apply the static address+default route, leaving the
      # node with no internet -> Tailscale offline -> etcd quorum lost. A MAC
      # deviceSelector is immune to eth0/end0 naming changes.
      - deviceSelector:
          hardwareAddr: e4:5f:01:3c:68:fa
        dhcp: false
        addresses:
          - 192.168.0.170/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.0.1
    nameservers:
      - 192.168.0.1
      - 8.8.8.8
  time:
    # Pi 4 has no battery-backed RTC: the clock starts at epoch (1970) on every
    # boot and MUST NTP-sync, or apid mints its TLS cert at 1970 and the node
    # is locked out of its API. Talos auto-rotates the apid cert once NTP syncs
    # (docs: time-sync), so a successful sync self-heals the lockout.
    #
    # Use IP-LITERAL servers: at (warm) boot DNS may not be ready yet, and the
    # closest-matching reported failure was public NTP-via-DNS giving up on
    # reboot (r/TalosLinux). IP literals remove the DNS dependency. Cloudflare
    # (162.159.200.123) + Google (216.239.35.0) are stable anycast NTP.
    disabled: false
    servers:
      - 162.159.200.123
      - 216.239.35.0
      - 216.239.35.4
    bootTimeout: 5m0s
  install:
    # OS lives on the SD card (mmcblk0); /dev/sda is the 248GB USB flash drive
    # used as the Longhorn data disk (see machine.disks below). Install must NOT
    # target sda or an upgrade/reinstall would wipe the data disk.
    disk: /dev/mmcblk0
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
      # kexec is broken on Raspberry Pi (bootloader runs on the VideoCore GPU;
      # kexec skips firmware re-init), so a kexec "warm" reboot leaves the
      # no-RTC clock stuck at epoch (1970) -> apid cert is minted at 1970 ->
      # node is locked out of its API until a real cold boot. Disabling the
      # kexec syscall forces Talos to do a full reboot every time.
      # Confirmed: Talos maintainer + siderolabs/talos#6046, r/TalosLinux.
      - kexec_load_disabled=1
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  # Partition/format/mount the 248GB USB flash drive (/dev/sda) as the Longhorn
  # data disk at /var/mnt/storage (Longhorn defaultDataPath). Mirrors tp1.
  disks:
    - device: /dev/sda
      partitions:
        - mountpoint: /var/mnt/storage
          size: 0  # use all available space
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  # controlPlane.endpoint + extraHostEntries are injected by nostos from
  # cluster.endpoint and the controlplane node set. Do not hardcode here.
  clusterName: talos-default
  network:
    cni:
      # Cilium is the CNI (see dell01.yaml / nostos/manifests/cilium/). cni:none
      # so Talos does not bootstrap flannel. rpi01 is offsite over Tailscale:
      # if cross-site pod traffic fragments, lower Cilium MTU toward 1230.
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  secretboxEncryptionSecret: "op://kubernetes/talos/CLUSTER_SECRETBOXENCRYPTIONSECRET"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: "op://kubernetes/talos/CLUSTER_CA_KEY"
  aggregatorCA:
    crt: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_CRT"
    key: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_KEY"
  serviceAccount:
    key: "op://kubernetes/talos/CLUSTER_SERVICEACCOUNT_KEY"
  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.32.1
    certSANs:
      - 192.168.0.170
    disablePodSecurityPolicy: true
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: privileged
            enforce-version: latest
            audit: privileged
            audit-version: latest
            warn: privileged
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
              - metallb-system
              - istio-system
            runtimeClasses: []
            usernames: []
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.32.1
  proxy:
    image: registry.k8s.io/kube-proxy:v1.32.1
  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.32.1
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}
  etcd:
    # Advertise the etcd peer URL on the Tailscale CGNAT range so the offsite
    # peer (dell01) is reachable cross-LAN without importing routes
    # (--accept-routes is forbidden here; see the tailscale block below).
    advertisedSubnets:
      - 100.64.0.0/10
    ca:
      crt: "op://kubernetes/talos/CLUSTER_ETCD_CA_CRT"
      key: "op://kubernetes/talos/CLUSTER_ETCD_CA_KEY"
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=rpi01
  # NEVER --accept-routes here: rpi01 hosts cluster pods, and importing the
  # advertised 10.244.0.0/16 route hijacks the pod CIDR (broke cluster-wide
  # DNS once — see .agents/contexts/remote pi.md). Cross-LAN etcd reach uses
  # Tailscale CGNAT (100.64.0.0/10) via etcd.advertisedSubnets instead.
  # --reset clears any previously-persisted tailscale prefs (e.g. a stale
  # --accept-routes) so `tailscale up` doesn't refuse the new flag set.
  - TS_EXTRA_ARGS=--reset
  - TS_ROUTES=10.96.0.0/12,192.168.0.0/24
