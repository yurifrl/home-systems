# Talos machineconfig TEMPLATE for rpi01 (Raspberry Pi 4, arm64)
# Role: control plane + worker at 192.168.0.170
version: v1alpha1
debug: false
persist: true

machine:
  type: controlplane
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: "op://kubernetes/talos/MACHINE_CA_KEY"
  certSANs:
    - 192.168.0.170
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    # Register with the LAN IP, never the Tailscale IP — otherwise pod->Service
    # VIP traffic gets DNAT'd to the TS IP and dropped by Tailscale netfilter
    # (pods aren't TS-authorized sources). Mirrors dell01.
    nodeIP:
      validSubnets:
        - 192.168.0.0/24
  network:
    hostname: rpi01
    interfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - 192.168.0.170/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.0.1
    nameservers:
      - 192.168.0.1
      - 8.8.8.8
  install:
    disk: /dev/sda
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  controlPlane:
    endpoint: https://192.168.68.100:6443
  clusterName: talos-default
  network:
    cni:
      # Cilium is the CNI (see dell01.yaml / nostos/manifests/cilium/). cni:none
      # so Talos does not bootstrap flannel. rpi01 is offsite over Tailscale:
      # if cross-site pod traffic fragments, lower Cilium MTU toward 1230.
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  secretboxEncryptionSecret: "op://kubernetes/talos/CLUSTER_SECRETBOXENCRYPTIONSECRET"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: "op://kubernetes/talos/CLUSTER_CA_KEY"
  aggregatorCA:
    crt: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_CRT"
    key: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_KEY"
  serviceAccount:
    key: "op://kubernetes/talos/CLUSTER_SERVICEACCOUNT_KEY"
  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.32.1
    certSANs:
      - 192.168.0.170
    disablePodSecurityPolicy: true
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: privileged
            enforce-version: latest
            audit: privileged
            audit-version: latest
            warn: privileged
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
              - metallb-system
              - istio-system
            runtimeClasses: []
            usernames: []
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.32.1
  proxy:
    image: registry.k8s.io/kube-proxy:v1.32.1
  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.32.1
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}
  etcd:
    # Advertise the etcd peer URL on the Tailscale CGNAT range so the offsite
    # peer (dell01) is reachable cross-LAN without importing routes
    # (--accept-routes is forbidden here; see the tailscale block below).
    advertisedSubnets:
      - 100.64.0.0/10
    ca:
      crt: "op://kubernetes/talos/CLUSTER_ETCD_CA_CRT"
      key: "op://kubernetes/talos/CLUSTER_ETCD_CA_KEY"
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=rpi01
  # NEVER --accept-routes here: rpi01 hosts cluster pods, and importing the
  # advertised 10.244.0.0/16 route hijacks the pod CIDR (broke cluster-wide
  # DNS once — see .agents/contexts/remote pi.md). Cross-LAN etcd reach uses
  # Tailscale CGNAT (100.64.0.0/10) via etcd.advertisedSubnets instead.
  # --reset clears any previously-persisted tailscale prefs (e.g. a stale
  # --accept-routes) so `tailscale up` doesn't refuse the new flag set.
  - TS_EXTRA_ARGS=--reset
  - TS_ROUTES=10.96.0.0/12,192.168.0.0/24
