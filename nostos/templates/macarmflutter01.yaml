# Talos machineconfig TEMPLATE for macarmflutter01 (UTM/QEMU VM, arm64, Apple Silicon)
# Role: worker. Boot the Talos arm64 ISO in UTM (virtio-scsi disk, RNG device,
# bridged network), then: nostos apply macarmflutter01 (insecure first-apply).
version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: ""
  certSANs: []
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
  network:
    hostname: macarmflutter01
    interfaces:
      - interface: enp0s1
        dhcp: false
        addresses:
          - 192.168.68.90/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
    nameservers:
      - 192.168.68.1
      - 8.8.8.8
  install:
    disk: /dev/vdb
    image: {{ .InstallImage }}
    wipe: true
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  controlPlane:
    endpoint: https://192.168.68.100:6443
  clusterName: talos-default
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: ""
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=macarmflutter01
  # On-LAN node (like dell01): NEVER --accept-routes (it hijacks the pod CIDR
  # and kills cluster DNS). --reset so `tailscale up` accepts the flag set.
  - TS_ROUTES=192.168.68.0/24
  - TS_EXTRA_ARGS=--reset
