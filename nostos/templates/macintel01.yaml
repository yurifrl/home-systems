# Talos machineconfig TEMPLATE for macintel01 (2020 Core i7 / 32GB Intel Mac, amd64)
# Role: control plane, running as a UTM VM on macOS (x86_64 guest, HVF).
# Boot the metal-amd64 ISO into maintenance, then `nostos apply macintel01`.
#
# VERIFY AT MAINTENANCE (UTM names differ; see vm01 lessons):
#   - network interface name  (vm01 was enp0s1; confirm with `get links`)
#   - install.disk            (UTM virtio: ISO=vda, hard disk=vdb; confirm with `get disks`)
#   - enable virtio-rng + a real hard disk in UTM before applying
version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: ""
  certSANs:
    - 192.168.68.91
    - 100.118.143.56
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    extraConfig:
      systemReserved:
        cpu: 150m
        memory: 512Mi
      kubeReserved:
        cpu: 150m
        memory: 512Mi
      evictionHard:
        memory.available: "500Mi"
        nodefs.available: "10%"
        imagefs.available: "10%"
    # Register the kubelet on the Tailscale IP (100.64.0.0/10) to keep this
    # node's cluster identity (100.118.143.56) stable across network moves,
    # matching dell01. cilium's VXLAN meshes over the tailnet CGNAT in both
    # directions; the KubePrism fix means the old 2026-06-05 TS-IP DNS break no
    # longer applies.
    nodeIP:
      validSubnets:
        - 100.64.0.0/10
  network:
    hostname: macintel01
    interfaces:
      - interface: enp0s1
        addresses:
          - 192.168.68.91/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
  install:
    disk: /dev/sda
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  registries:
    config:
      ghcr.io:
        auth:
          username: "op://kubernetes/ghcr-image-pull-secret/username"
          password: "op://kubernetes/ghcr-image-pull-secret/password"
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  # DEMOTED to worker (was controlplane). CP = dell01+tp1+tp4 (home LAN).
  # controlPlane.endpoint + extraHostEntries are injected by nostos.
  clusterName: talos-default
  network:
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: ""
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}

---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=macintel01
  - TS_DEBUG_OMIT_LOCAL_ADDRS=true
  # On-LAN node now (like dell01/macarm01): advertise the cluster LAN /24 and
  # NEVER --accept-routes (it hijacks the pod CIDR and breaks node-local DNS).
  # macintel01 sits directly on 192.168.68.0/24, so it reaches the CP apiserver
  # and other node IPs over the LAN - no accepted routes needed.
  - TS_ROUTES=192.168.68.0/24
  - TS_EXTRA_ARGS=--reset
