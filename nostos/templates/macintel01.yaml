# Talos machineconfig TEMPLATE for macintel01 (2020 Core i7 / 32GB Intel Mac, amd64)
# Role: control plane, running as a UTM VM on macOS (x86_64 guest, HVF).
# Boot the metal-amd64 ISO into maintenance, then `nostos apply macintel01`.
#
# VERIFY AT MAINTENANCE (UTM names differ; see vm01 lessons):
#   - network interface name  (vm01 was enp0s1; confirm with `get links`)
#   - install.disk            (UTM virtio: ISO=vda, hard disk=vdb; confirm with `get disks`)
#   - enable virtio-rng + a real hard disk in UTM before applying
version: v1alpha1
debug: false
persist: true

machine:
  type: controlplane
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: "op://kubernetes/talos/MACHINE_CA_KEY"
  certSANs:
    - 192.168.68.91
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    extraConfig:
      systemReserved:
        cpu: 150m
        memory: 512Mi
      kubeReserved:
        cpu: 150m
        memory: 512Mi
      evictionHard:
        memory.available: "500Mi"
        nodefs.available: "10%"
        imagefs.available: "10%"
    # Register with the LAN IP, not the Tailscale IP (else Service-VIP traffic
    # gets DNAT'd to the TS IP and dropped — the 2026-06-05 DNS break).
    nodeIP:
      validSubnets:
        - 192.168.68.0/24
  network:
    hostname: macintel01
    interfaces:
      - interface: enp0s1
        dhcp: false
        addresses:
          - 192.168.68.91/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
    nameservers:
      - 192.168.68.1
      - 8.8.8.8
  install:
    disk: /dev/sda
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  registries:
    config:
      ghcr.io:
        auth:
          username: "op://kubernetes/ghcr-image-pull-secret/username"
          password: "op://kubernetes/ghcr-image-pull-secret/password"
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  # Home lab: control planes also run workloads.
  allowSchedulingOnControlPlanes: true
  controlPlane:
    endpoint: https://192.168.68.100:6443
  clusterName: talos-default
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  secretboxEncryptionSecret: "op://kubernetes/talos/CLUSTER_SECRETBOXENCRYPTIONSECRET"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: "op://kubernetes/talos/CLUSTER_CA_KEY"
  aggregatorCA:
    crt: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_CRT"
    key: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_KEY"
  serviceAccount:
    key: "op://kubernetes/talos/CLUSTER_SERVICEACCOUNT_KEY"
  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.32.1
    certSANs:
      - 192.168.68.91
    disablePodSecurityPolicy: true
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: privileged
            enforce-version: latest
            audit: privileged
            audit-version: latest
            warn: privileged
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
              - metallb-system
              - istio-system
            runtimeClasses: []
            usernames: []
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.32.1
  proxy:
    image: registry.k8s.io/kube-proxy:v1.32.1
  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.32.1
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}
  etcd:
    # Advertise the etcd peer URL on the Tailscale CGNAT range so all CPs
    # (incl. offsite rpi01) share one etcd mesh. Pairs with dell01/rpi01/vm01.
    advertisedSubnets:
      - 100.64.0.0/10
    ca:
      crt: "op://kubernetes/talos/CLUSTER_ETCD_CA_CRT"
      key: "op://kubernetes/talos/CLUSTER_ETCD_CA_KEY"
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=macintel01
  - TS_ROUTES=192.168.68.0/24
  - TS_EXTRA_ARGS=--reset
