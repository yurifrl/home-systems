# Talos machineconfig TEMPLATE for macintel01 (2020 Core i7 / 32GB Intel Mac, amd64)
# Role: control plane, running as a UTM VM on macOS (x86_64 guest, HVF).
# Boot the metal-amd64 ISO into maintenance, then `nostos apply macintel01`.
#
# VERIFY AT MAINTENANCE (UTM names differ; see vm01 lessons):
#   - network interface name  (vm01 was enp0s1; confirm with `get links`)
#   - install.disk            (UTM virtio: ISO=vda, hard disk=vdb; confirm with `get disks`)
#   - enable virtio-rng + a real hard disk in UTM before applying
version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: ""
  certSANs:
    - 192.168.0.91
    - 192.168.68.91
    - 100.118.143.56
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    extraConfig:
      systemReserved:
        cpu: 150m
        memory: 512Mi
      kubeReserved:
        cpu: 150m
        memory: 512Mi
      evictionHard:
        memory.available: "500Mi"
        nodefs.available: "10%"
        imagefs.available: "10%"
    # Register the kubelet on the Tailscale IP (100.64.0.0/10), NOT the roaming
    # LAN address. This node moves between networks (DHCP), so its LAN IP is
    # unstable and unreachable from other sites; the Tailscale IP is stable and
    # every node routes the tailnet CGNAT directly, so cilium's VXLAN mesh works
    # in BOTH directions (the LAN-IP nodeIP left return traffic unroutable ->
    # broke pod DNS/service on this node). Matches the working macarm01 pattern.
    # Pairs with --accept-routes below (to reach the CP LAN apiserver). The old
    # 2026-06-05 TS-IP DNS break predates the cilium KubePrism fix and no longer
    # applies.
    nodeIP:
      validSubnets:
        - 100.64.0.0/10
  network:
    hostname: macintel01
    interfaces:
      - interface: enp0s1
        addresses:
          - 192.168.0.91/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.0.1
  install:
    disk: /dev/sda
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  registries:
    config:
      ghcr.io:
        auth:
          username: "op://kubernetes/ghcr-image-pull-secret/username"
          password: "op://kubernetes/ghcr-image-pull-secret/password"
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  # DEMOTED to worker (was controlplane). CP = dell01+tp1+tp4 (home LAN).
  # controlPlane.endpoint + extraHostEntries are injected by nostos.
  clusterName: talos-default
  network:
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: ""
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}

---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=macintel01
  # Advertise ONLY the pinned LAN /24 over Tailscale so this node's apiserver
  # endpoint (192.168.0.91) is routable from every site. .91 is a static,
  # below-DHCP-pool address, so the /24 is a stable subnet route. Distinct from
  # rpi01's 192.168.9.0/24 - no collision.
  # Do NOT advertise 10.96.0.0/12 (Service CIDR): if any node accepts routes it
  # would pull 10.96.0.1/DNS across the tailnet and break cluster networking.
  # --accept-routes is SAFE here only because the tailnet approves just LAN /24s
  # (incl. 192.168.68.0/24 for the control plane) - never the Service/pod CIDRs.
  # Needed so cilium's VXLAN to the CP node IPs (192.168.68.x) is reachable.
  - TS_ROUTES=192.168.0.0/24
  - TS_EXTRA_ARGS=--reset --accept-routes
