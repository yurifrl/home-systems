# Talos machineconfig TEMPLATE for dell01 (OptiPlex 3080M, amd64)
# Role: control plane node at 192.168.68.100
#
# Rendered via `task pxe:config NODE=dell01`:
#   - 1Password secret references (op-colon-slash-slash) are injected
#   - Output lands in pxe/assets/configs/<mac-hex-hyphens>.yaml
#   - Served over HTTP during PXE boot via talos.config= kernel arg
#
# Secrets are reused from the original cluster (stored in 1Password "kubernetes" vault)
# so workers (tp1/tp4/rpi) can re-join without regenerating configs.
version: v1alpha1
debug: false
persist: true

machine:
  type: controlplane
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: "op://kubernetes/talos/MACHINE_CA_KEY"
  certSANs:
    - 192.168.68.100
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    # Node-protection: reserve memory for the OS + kubelet + control-plane
    # static pods so the kubepods cgroup (capped at Allocatable via the
    # default enforceNodeAllocatable: [pods]) can never consume the whole
    # 7.6Gi node. Without this, Allocatable ~= Capacity and a workload spike
    # OOMs the node itself, taking down etcd/apiserver (2026-06-14 incident).
    # evictionHard makes the kubelet shed low-priority pods before that limit.
    extraConfig:
      systemReserved:
        cpu: 150m
        memory: 512Mi
      kubeReserved:
        cpu: 150m
        memory: 512Mi
      evictionHard:
        memory.available: "500Mi"
        nodefs.available: "10%"
        imagefs.available: "10%"
    # Force kubelet to register with the LAN IP, not the Tailscale IP.
    # Otherwise pod-to-Service VIP traffic gets DNAT'd to the TS IP and
    # dropped by Tailscale's netfilter rules (pods aren't TS-authorized
    # sources). This is what broke DNS on 2026-06-05.
    nodeIP:
      validSubnets:
        - 192.168.68.0/24
    extraMounts:
      - destination: /var/mnt/storage
        type: bind
        source: /var/mnt/storage
        options:
          - bind
          - rshared
          - rw
  network:
    hostname: dell01
    interfaces:
      - interface: enp2s0
        dhcp: false
        addresses:
          - 192.168.68.100/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
    nameservers:
      - 192.168.68.1
      - 8.8.8.8
  install:
    disk: /dev/nvme0n1
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  # /dev/sda is a 256GB SATA SSD (wiped of its old Windows install) used as
  # Longhorn storage, mounted at /var/mnt/storage like the tp* workers.
  disks:
    - device: /dev/sda
      partitions:
        - mountpoint: /var/mnt/storage
          size: 0
  nodeLabels:
    node.kubernetes.io/exclude-from-external-load-balancers: ""
    syscd.dev/storage: dell01
    node.longhorn.io/create-default-disk: "true"

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  # Home lab: controlplane nodes also run workloads. Without this, the
  # default node-role.kubernetes.io/control-plane:NoSchedule taint blocks
  # scheduling whenever the worker nodes are unhealthy (as we hit during
  # the 2026-06-05 DNS outage with tp1/tp4 NotReady).
  allowSchedulingOnControlPlanes: true
  controlPlane:
    endpoint: https://192.168.68.100:6443
  clusterName: talos-default
  network:
    cni:
      # Cilium is the CNI. Talos must NOT bootstrap flannel. With cni:none the
      # node stays NotReady until Cilium is installed (manual `helm install`
      # during the bootstrap window; ArgoCD app k8s/applications/cilium.yaml
      # adopts it for day-2). See nostos/manifests/cilium/.
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  secretboxEncryptionSecret: "op://kubernetes/talos/CLUSTER_SECRETBOXENCRYPTIONSECRET"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: "op://kubernetes/talos/CLUSTER_CA_KEY"
  aggregatorCA:
    crt: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_CRT"
    key: "op://kubernetes/talos/CLUSTER_AGGREGATORCA_KEY"
  serviceAccount:
    key: "op://kubernetes/talos/CLUSTER_SERVICEACCOUNT_KEY"
  apiServer:
    image: registry.k8s.io/kube-apiserver:v1.32.1
    certSANs:
      - 192.168.68.100
    disablePodSecurityPolicy: true
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: privileged
            enforce-version: latest
            audit: privileged
            audit-version: latest
            warn: privileged
            warn-version: latest
          exemptions:
            namespaces:
              - kube-system
              - metallb-system
              - istio-system
            runtimeClasses: []
            usernames: []
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
  controllerManager:
    image: registry.k8s.io/kube-controller-manager:v1.32.1
  proxy:
    image: registry.k8s.io/kube-proxy:v1.32.1
  scheduler:
    image: registry.k8s.io/kube-scheduler:v1.32.1
  discovery:
    enabled: true
    registries:
      kubernetes:
        disabled: true
      service: {}
  etcd:
    # Advertise the etcd peer URL on the Tailscale CGNAT range so offsite
    # controlplanes (rpi01) can reach this peer cross-LAN without importing
    # routes. Pairs with rpi01's etcd.advertisedSubnets.
    advertisedSubnets:
      - 100.64.0.0/10
    ca:
      crt: "op://kubernetes/talos/CLUSTER_ETCD_CA_CRT"
      key: "op://kubernetes/talos/CLUSTER_ETCD_CA_KEY"
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=dell01
  - TS_ROUTES=192.168.68.0/24
  - TS_EXTRA_ARGS=--reset
