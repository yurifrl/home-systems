# Talos machineconfig for talos-pc01 (Proxmox VM 100, provisioned by Crossplane
# via k8s/charts/crossplane-proxmox). Role: worker, amd64, virtio-scsi disk
# (/dev/sda). Crossplane creates/boots the VM; this applies the OS install:
#   op inject -i nostos/templates/talos-pc01.yaml -o /tmp/talos-pc01.final.yaml
#   talosctl apply-config --insecure -n <vm-ip> -f /tmp/talos-pc01.final.yaml
version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  token: "op://kubernetes/talos/MACHINE_TOKEN"
  ca:
    crt: "op://kubernetes/talos/MACHINE_CA_CRT"
    key: ""
  certSANs:
    - 192.168.68.104
    - 100.101.182.40
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    # Register on the Tailscale IP so every cilium VXLAN tunnel endpoint is a
    # 100.x address (homogeneous mesh: send+receive on tailscale0, no LAN/TS
    # cross-family pairs to drop at kernel decap - see home-systems-h27). The
    # old DNS-break (2026-06-05) was --accept-routes importing the pod/Service
    # CIDR, NOT TS-IP-as-nodeIP; hostDNS.forwardKubeDNSToHost answers ClusterDNS
    # node-locally so pods never SNAT onto the tailnet. LAN nodes stay
    # accept-routes-free.
    nodeIP:
      validSubnets:
        - 100.64.0.0/10
  network:
    hostname: pc01
    interfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - 192.168.68.104/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.68.1
    nameservers:
      - 192.168.68.1
      - 8.8.8.8
  install:
    disk: /dev/sda
    image: {{ .InstallImage }}
    wipe: true
    extraKernelArgs:
      - talos.dashboard.disabled=0
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  registries:
    config:
      ghcr.io:
        auth:
          username: "op://kubernetes/ghcr-image-pull-secret/username"
          password: "op://kubernetes/ghcr-image-pull-secret/password"

cluster:
  id: "op://kubernetes/talos/CLUSTER_ID"
  secret: "op://kubernetes/talos/CLUSTER_SECRET"
  # controlPlane.endpoint + extraHostEntries are injected by nostos from
  # cluster.endpoint and the controlplane node set. Do not hardcode here.
  clusterName: talos-default
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: "op://kubernetes/talos/CLUSTER_TOKEN"
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: ""
---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=pc01
  # No --accept-routes: LAN nodes importing 192.168.68.0/24 via tailscale
  # hijack their own LAN traffic (VXLAN/DNS break, 2026-07-03).
