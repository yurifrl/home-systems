# Talos machineconfig TEMPLATE for tp1 (Turing Pi RK1, arm64)
# Role: worker at 192.168.68.107 (demoted from controlplane 2026-07-04 - the
# 3-member etcd meshed over Tailscale kept losing quorum on any reboot; the
# control plane is now dell01-only. tp1 was removed as an etcd member and
# stripped to worker-minimal, mirroring talos-pc01.yaml / rpi01.yaml).
version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  token: op://kubernetes/talos/MACHINE_TOKEN
  ca:
    crt: op://kubernetes/talos/MACHINE_CA_CRT
    key: ""
  certSANs:
    - 192.168.68.107
  kubelet:
    image: ghcr.io/siderolabs/kubelet:v1.32.1
    defaultRuntimeSeccompProfileEnabled: true
    disableManifestsDirectory: true
    # Register on the LAN IP, never the Tailscale IP (dell01 model): pod->Service
    # VIP traffic DNAT'd to a TS IP is dropped by Tailscale netfilter.
    nodeIP:
      validSubnets:
        - 192.168.68.0/24
    # Node-protection: reserve memory for OS/kubelet so the kubepods cgroup is
    # capped below the ~8Gi capacity; evictionHard sheds low-priority pods
    # before the node OOMs.
    extraConfig:
      systemReserved:
        cpu: 150m
        memory: 512Mi
      kubeReserved:
        cpu: 150m
        memory: 512Mi
      evictionHard:
        memory.available: "500Mi"
        nodefs.available: "10%"
        imagefs.available: "10%"
    extraMounts:
      - destination: /var/mnt/storage
        type: bind
        source: /var/mnt/storage
        options:
          - bind
          - rshared
          - rw
      - destination: /var/local
        type: bind
        source: /var/local
        options:
          - bind
          - rshared
          - rw
  network:
    hostname: tp1
  install:
    disk: /dev/mmcblk0
    image: {{ .InstallImage }}
    wipe: false
  registries:
    config:
      ghcr.io:
        auth:
          username: "op://kubernetes/ghcr-image-pull-secret/username"
          password: "op://kubernetes/ghcr-image-pull-secret/password"
  features:
    rbac: true
    stableHostname: true
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    kubePrism:
      enabled: true
      port: 7445
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
  # NVMe is the Longhorn data disk mounted at /var/mnt/storage.
  disks:
    - device: /dev/nvme0n1
      partitions:
        - mountpoint: /var/mnt/storage
          size: 0  # use all available space
  nodeLabels:
    syscd.dev/storage: tp1
    node.longhorn.io/create-default-disk: "true"

cluster:
  id: op://kubernetes/talos/CLUSTER_ID
  secret: op://kubernetes/talos/CLUSTER_SECRET
  # Worker: runs no etcd/apiserver/controller-manager/scheduler. Only needs the
  # cluster CA cert (not the key), token, and network. controlPlane.endpoint +
  # extraHostEntries are injected by nostos. Mirrors talos-pc01.yaml.
  clusterName: talos-default
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  token: op://kubernetes/talos/CLUSTER_TOKEN
  ca:
    crt: "op://kubernetes/talos/CLUSTER_CA_CRT"
    key: ""

---
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=tailscale://authkey?description=tp1
  # LAN node: advertise the LAN /24 as a subnet route for off-LAN workers, but
  # NEVER --accept-routes (importing pod/service CIDRs breaks DNS). dell01 model.
  # --reset clears any previously-persisted prefs.
  - TS_ROUTES=192.168.68.0/24
  - TS_EXTRA_ARGS=--reset
