# Talos Image Factory schematic for arm64 VM nodes (VMware Fusion / Apple Silicon).
# extraKernelArgs fix the early-boot `crypto/rand: blocked 60s` entropy stall on
# headless arm64 VMs (no virtio-rng / TPM) by trusting the CPU/bootloader RNG.
# Paste at https://factory.talos.dev or POST it to get the schematic ID:
#   curl -s -X POST --data-binary @nostos/manifests/schematics/vm01-arm64.yaml \
#     https://factory.talos.dev/schematics
customization:
  extraKernelArgs:
    - random.trust_cpu=on
    - random.trust_bootloader=on
  systemExtensions:
    officialExtensions:
      - siderolabs/tailscale
      - siderolabs/iscsi-tools
      - siderolabs/util-linux-tools
