cluster:
  name: talos-default
  endpoint: https://192.168.68.100:6443
  talos_version: v1.13.3
  # Tailscale operator hostname running the API server proxy. When set,
  # `nostos kubeconfig` also adds a remote context reaching the cluster over
  # the tailnet (alongside the LAN context). Empty disables it.
  tailscale_operator: tailscale-operator
  # amd64 (dell01): tailscale + iscsi-tools + util-linux-tools (Longhorn needs iscsiadm)
  schematic_id: 8f04ea6b6016f12a593fa8a87441270075c648cb75482c2d9d3db8cecda47da1
secrets:
  backend: onepassword
  onepassword:
    account: my.1password.com
    vault: kubernetes
  tailscale:
    oauth_client_id_ref:     op://kubernetes/talos/tailscale-oauth-client-id
    oauth_client_secret_ref: op://kubernetes/talos/tailscale-oauth-client-secret
    tags:        [tag:k8s]
    expiry:      7776000
    reusable:    false
    ephemeral:   false
    preauthorized: true
    description: nostos
bootstrap:
  # Cluster-bootstrap tier. When present, `nostos render` synthesizes three
  # inline manifests into each controlplane machineconfig (root op-credentials
  # Secret, nostos-bootstrap-config ConfigMap, controller bundle) instead of the
  # old hand-written cluster.inlineManifests/extraManifests blobs. Takes effect
  # only on a fresh cluster-init (`nostos up`); the in-cluster controller then
  # drives namespaces, ESO, ClusterSecretStore, Cilium, ArgoCD, and app-gen.
  cilium:
    version: v1.18.0
    values:
      # Phase 1: keep kube-proxy (lowest-risk coexistence with Istio Ambient).
      # See nostos/manifests/cilium/values-phase1.yaml.
      kubeProxyReplacement: false
  argocd:
    version: v3.4.3
  repos:
    - url: https://github.com/yurifrl/home-systems.git
      path: k8s/applications
      revision: main
  namespaces: [argocd, external-secrets, 1password]
  controller_image:
    # Tag MUST already exist as a multi-arch manifest list before any cluster
    # boots with this config, or the controller pod ImagePullBackOffs pre-CNI.
    repo: ghcr.io/yurifrl/nostos-bootstrap
    tag: bootstrap-v0.1.0
  root_secret:
    # The irreducible 1Password Connect Secret. op:// refs are resolved at
    # render time; values land under Secret.data (already base64 in 1Password).
    name: op-credentials
    namespace: 1password
    data:
      1password-credentials.json: op://kubernetes/op-credentials/OP_CREDENTIALS_JSON
      token: op://kubernetes/op-credentials/OP_CONNECT_TOKEN
nodes:
  dell01:
    mac: "d0:94:66:d9:eb:a5"
    ip: 192.168.68.100
    role: controlplane
    arch: amd64
    install_disk: /dev/nvme0n1
    template: dell01.yaml
  tp1:
    ip: 192.168.68.107
    role: worker
    arch: arm64
    install_disk: /dev/mmcblk0
    template: tp1.yaml
    # arm64 (+turingrk1 overlay): tailscale + iscsi-tools + util-linux-tools
    schematic_id: 6f9371bccd9df78d8c26521528700b463f25bce1cad97691722a4189719e6aa9
    boot:
      method: tpi
      tpi:
        host: turingpi.local
        slot: 1
        username_ref: op://kubernetes/home-systems/TURING_BMC_USERNAME
        password_ref: op://kubernetes/home-systems/TURING_BMC_PASSWORD
  tp4:
    ip: 192.168.68.114
    role: worker
    arch: arm64
    install_disk: /dev/mmcblk0
    template: tp4.yaml
    # arm64 (+turingrk1 overlay): tailscale + iscsi-tools + util-linux-tools
    schematic_id: 6f9371bccd9df78d8c26521528700b463f25bce1cad97691722a4189719e6aa9
    boot:
      method: tpi
      tpi:
        host: turingpi.local
        slot: 4
        username_ref: op://kubernetes/home-systems/TURING_BMC_USERNAME
        password_ref: op://kubernetes/home-systems/TURING_BMC_PASSWORD
  rpi01:
    mac: "e4:5f:01:3c:68:fa"
    ip: 192.168.0.170
    role: controlplane
    arch: arm64
    install_disk: /dev/sda
    template: rpi01.yaml
    overlay: rpi_generic
    # Provisioned offline: `nostos flash rpi01 --device /dev/diskN` writes the
    # image; once the Pi is booted, `nostos apply rpi01` pushes the
    # machineconfig (insecure first-apply auto-detected in maintenance mode).
    boot:
      method: pxe
    # arm64 (rpi_generic overlay): tailscale + iscsi-tools + util-linux-tools
    schematic_id: d0e797e79d4e8c53a843776a1a5b57a3429aaaf7e8e3246d35df5df9f915da86
  vm01:
    # VMware Fusion VM on Apple Silicon (arm64). Not PXE/TPI-bootable: boot the
    # VM from the Talos arm64 ISO, then `talosctl apply-config --insecure`.
    # mac is only needed to satisfy validation; set the VM's real MAC if you
    # ever wire up PXE. EDIT: set the real IP and install_disk.
    mac: "00:0c:29:b0:c0:b0"
    ip: 192.168.68.90
    role: controlplane
    arch: arm64
    install_disk: /dev/sda
    template: vm01.yaml
    # arm64 VM: tailscale + iscsi-tools + util-linux-tools + entropy kernel args
    # (random.trust_cpu/bootloader) baked in to fix the ISO crypto/rand stall.
    # Source: nostos/manifests/schematics/vm01-arm64.yaml
    schematic_id: 773f49ef0c412e83da0eb190d3b1915aba0c2baf358f4db7589fd843788751ab
    # boot.method is unused for a manually-ISO-booted VM (render ignores it),
    # but config validation only accepts pxe|tpi, so we set pxe.
    boot:
      method: pxe
  pc01:
    # Bare-metal Proxmox VE host (Gigabyte B450 Aorus Elite V2, AMI UEFI,
    # Realtek GbE, dual M.2 NVMe). PXE-booted into the Proxmox installer
    # instead of Talos; nostos resolves the newest Proxmox release at serve
    # time. Once Proxmox is on disk it hosts a Talos worker VM + a Windows VM.
    mac: "fc:3c:d7:27:66:17"
    ip: 192.168.68.101
    role: worker
    arch: amd64
    install_disk: /dev/nvme0n1
    os:
      name: proxmox
      version: latest
    boot:
      method: pxe

  talos-pc01:
    # Talos worker running AS a Proxmox VM (VM 100) on the pc01 host, created by
    # Crossplane (k8s/charts/crossplane-proxmox). Not PXE/TPI-bootable: Crossplane
    # boots it from the Talos ISO into maintenance, then:
    #   nostos apply talos-pc01 --insecure
    # mac/boot.method only satisfy validation; render ignores boot.method.
    mac: "bc:24:11:45:72:b6"
    ip: 192.168.68.104
    role: worker
    arch: amd64
    install_disk: /dev/nvme0n1
    template: talos-pc01.yaml
    schematic_id: 8f04ea6b6016f12a593fa8a87441270075c648cb75482c2d9d3db8cecda47da1
    boot:
      method: pxe

# Guest-VM install ISOs (built/published/signed by `nostos iso`). Machine-
# specific identity stays out of this (public) file: the bucket is an op:// ref
# resolved at runtime; nothing sensitive is a literal here.
images:
  windows:
    build:
      uup_id: f7e8991e-4fd8-4bfd-a404-0de6dccd4191
      edition: professional
      driver_source: https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso
      # autounattend.xml lives with the crossplane chart that consumes the ISO.
      answer_file: ../k8s/charts/crossplane-proxmox/files/autounattend.xml
    store:
      bucket: op://kubernetes/crossplane-proxmox/bucket
      object: Win11_24H2_combined.iso
    credentials_ref: op://kubernetes/crossplane-gcp/creds
