cluster:
  name: talos-default
  endpoint: https://192.168.68.100:6443
  talos_version: v1.13.3
  # amd64 (dell01): tailscale + iscsi-tools + util-linux-tools (Longhorn needs iscsiadm)
  schematic_id: 8f04ea6b6016f12a593fa8a87441270075c648cb75482c2d9d3db8cecda47da1
secrets:
  backend: onepassword
  onepassword:
    account: my.1password.com
    vault: kubernetes
  tailscale:
    oauth_client_id_ref:     op://kubernetes/talos/tailscale-oauth-client-id
    oauth_client_secret_ref: op://kubernetes/talos/tailscale-oauth-client-secret
    tags:        [tag:k8s]
    expiry:      7776000
    reusable:    false
    ephemeral:   false
    preauthorized: true
    description: nostos
nodes:
  dell01:
    mac: "d0:94:66:d9:eb:a5"
    ip: 192.168.68.100
    role: controlplane
    arch: amd64
    install_disk: /dev/nvme0n1
    template: dell01.yaml
  tp1:
    ip: 192.168.68.107
    role: worker
    arch: arm64
    install_disk: /dev/mmcblk0
    template: tp1.yaml
    # arm64 (+turingrk1 overlay): tailscale + iscsi-tools + util-linux-tools
    schematic_id: 6f9371bccd9df78d8c26521528700b463f25bce1cad97691722a4189719e6aa9
    boot:
      method: tpi
      tpi:
        host: turingpi.local
        slot: 1
        username_ref: op://kubernetes/home-systems/TURING_BMC_USERNAME
        password_ref: op://kubernetes/home-systems/TURING_BMC_PASSWORD
  tp4:
    ip: 192.168.68.114
    role: worker
    arch: arm64
    install_disk: /dev/mmcblk0
    template: tp4.yaml
    # arm64 (+turingrk1 overlay): tailscale + iscsi-tools + util-linux-tools
    schematic_id: 6f9371bccd9df78d8c26521528700b463f25bce1cad97691722a4189719e6aa9
    boot:
      method: tpi
      tpi:
        host: turingpi.local
        slot: 4
        username_ref: op://kubernetes/home-systems/TURING_BMC_USERNAME
        password_ref: op://kubernetes/home-systems/TURING_BMC_PASSWORD
