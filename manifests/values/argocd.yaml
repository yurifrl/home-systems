# to apply this, you need to be on argo machine, make sure this is in the correct path, git pull

# and run
# sudo systemctl restart secret-loader
# sudo systemctl status secret-loader
# sudo journalctl -u secret-loader -f 
#
# sudo systemctl status argo-setup
# sudo systemctl restart argo-setup & sudo journalctl -u argo-setup.service -f 
#
# helm repo add argo-cd https://argoproj.github.io/argo-helm; helm repo update
# helm upgrade -n argocd --install argocd argo-cd/argo-cd -f k8s/values/argo.yaml --wait
global:
  addPrometheusAnnotations: true

controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists
  # Default readinessProbe (timeoutSeconds: 1) causes the application-controller
  # to be marked NotReady when reconciling many apps at once. Combined with
  # frequent SandboxChanged events, the pod CrashLoopBackOffs and silently
  # blocks every cluster sync. Relaxed values prevent that.
  # See: 2026-06-04 incident where this masked the longhorn upgrade for 22h.
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 5

dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

server:
  ingress:
    enabled: false
  insecure: true
  configs:
    params:
      server.insecure: true
      exec.enabled: true
      server.disable.auth: true
  autoscaling:
    enabled: true
    minReplicas: 1
  extraArgs:
    - --insecure
    - --disable-auth
   
  admin:
    enabled: true
    passwordSecret:
      name: argocd-secret
      key: admin.password

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

repoServer:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

applicationSet:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

configs:
  cm:
    # -- Enable exec feature in Argo UI
    ## Ref: https://argo-cd.readthedocs.io/en/latest/operator-manual/rbac/#exec-resource
    exec.enabled: true

    # -- Timeout to discover if a new manifests version got published to the repository
    timeout.reconciliation: 10s

    # -- Timeout to refresh application data as well as target manifests cache
    timeout.hard.reconciliation: 0s

    # Skip listing every Crossplane GCP provider's CRDs during cluster cache
    # sync. The conversion webhooks for these CRDs (provider-gcp-iam,
    # provider-gcp-storage, provider-gcp-cloudplatform) point at the
    # provider's webhook Service, but those provider Deployments and
    # ProviderRevisions are unhealthy/missing. The dead webhooks 404 the
    # entire ComparisonError chain, which blocked every Argo Application
    # from reconciling. Excluding these apiGroups decouples Argo from the
    # outage. Remove this once the GCP providers are healthy again.
    resource.exclusions: |
      - apiGroups:
          - cloudplatform.gcp.upbound.io
          - iam.gcp.upbound.io
          - storage.gcp.upbound.io
          - gcp.upbound.io
        kinds:
          - "*"