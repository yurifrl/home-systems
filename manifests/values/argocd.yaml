# to apply this, you need to be on argo machine, make sure this is in the correct path, git pull

# and run
# sudo systemctl restart secret-loader
# sudo systemctl status secret-loader
# sudo journalctl -u secret-loader -f 
#
# sudo systemctl status argo-setup
# sudo systemctl restart argo-setup & sudo journalctl -u argo-setup.service -f 
#
# helm repo add argo-cd https://argoproj.github.io/argo-helm; helm repo update
# helm upgrade -n argocd --install argocd argo-cd/argo-cd -f k8s/values/argo.yaml --wait
global:
  addPrometheusAnnotations: true
  priorityClassName: platform-critical

controller:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists
  # Default readinessProbe (timeoutSeconds: 1) causes the application-controller
  # to be marked NotReady when reconciling many apps at once. Combined with
  # frequent SandboxChanged events, the pod CrashLoopBackOffs and silently
  # blocks every cluster sync. Relaxed values prevent that.
  # See: 2026-06-04 incident where this masked the longhorn upgrade for 22h.
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 30
    failureThreshold: 5

dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

server:
  ingress:
    enabled: false
  insecure: true
  configs:
    params:
      server.insecure: true
      exec.enabled: true
      server.disable.auth: true
  autoscaling:
    enabled: true
    minReplicas: 1
  extraArgs:
    - --insecure
    - --disable-auth
   
  admin:
    enabled: true
    passwordSecret:
      name: argocd-secret
      key: admin.password

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

repoServer:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

applicationSet:
  replicas: 1
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
      operator: Exists

configs:
  cm:
    # Passwordless UI: --disable-auth only opens the API; the web UI still shows
    # a login page without a session. Anonymous access gives the UI a session.
    users.anonymous.enabled: "true"

    # -- Enable exec feature in Argo UI
    ## Ref: https://argo-cd.readthedocs.io/en/latest/operator-manual/rbac/#exec-resource
    exec.enabled: true

    # -- Timeout to discover if a new manifests version got published to the repository
    timeout.reconciliation: 10s

    # -- Timeout to refresh application data as well as target manifests cache
    timeout.hard.reconciliation: 0s

    # Crossplane upbound provider CRDs use webhook conversion. When a provider
    # pod is unreachable (e.g. wedged node), the apiserver's conversion call
    # times out, that single LIST fails, and ArgoCD's whole cluster cache sync
    # aborts -> NO app can sync (see 2026-07-05 postmortem). The upbound
    # exclusion was removed once the gcp providers were pinned+tolerated onto a
    # stable control-plane node so their webhooks always have an endpoint; if a
    # provider pod goes Pending/crashloops again, re-add an `*.upbound.io`
    # block here to decouple ArgoCD from the webhooks.
    # The blocks below are the argo-cd chart defaults, kept because setting this
    # key replaces the chart default wholesale.
    resource.exclusions: |
      - apiGroups:
          - metallb.io
        kinds:
          - "*"
        clusters:
          - "*"
      - apiGroups:
          - ''
          - discovery.k8s.io
        kinds:
          - Endpoints
          - EndpointSlice
      - apiGroups:
          - coordination.k8s.io
        kinds:
          - Lease
      - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
        kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
      - apiGroups:
          - certificates.k8s.io
        kinds:
          - CertificateSigningRequest
      - apiGroups:
          - cert-manager.io
        kinds:
          - CertificateRequest
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
          - CiliumEndpoint
          - CiliumEndpointSlice
      - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
        kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest

  rbac:
    # Anonymous user needs a role, otherwise the passwordless UI has no access.
    policy.default: role:admin
