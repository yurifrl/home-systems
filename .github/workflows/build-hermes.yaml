name: Build Hermes Image

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/images/hermes/**'
      - '.github/workflows/build-hermes.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/hermes-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read versions from Dockerfile
        id: vers
        run: |
          DF=k8s/images/hermes/Dockerfile
          # Python tag prefix only (e.g. 3.14 from 3.14-slim-trixie)
          PY=$(grep -oP '^ARG PYTHON_VERSION=\K[0-9]+\.[0-9]+' "$DF")
          HV=$(grep -oP '^ARG HERMES_VERSION=\K[0-9.]+' "$DF")
          echo "py=$PY" >> "$GITHUB_OUTPUT"
          echo "hv=$HV" >> "$GITHUB_OUTPUT"
          echo "Building hermes $HV on python $PY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vers.outputs.hv }}-py${{ steps.vers.outputs.py }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: k8s/images/hermes
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
