name: Build Hermes Image

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/images/hermes/**'
      - '.github/workflows/build-hermes.yaml'
  workflow_dispatch:
    inputs:
      hermes_version:
        description: 'Hermes Agent version (PyPI) to build'
        required: false
        default: '0.15.2'

env:
  # In-cluster Docker registry (plain HTTP, no auth, internal only).
  REGISTRY: registry.registry.svc.cluster.local:5000
  IMAGE_NAME: hermes-agent

jobs:
  build:
    runs-on: syscd-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # network=host lets buildkit reach the in-cluster registry Service;
          # the inline config marks it as insecure/HTTP so push works without TLS.
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
              insecure = true

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.hermes_version || '0.15.2' }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: k8s/images/hermes
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HERMES_VERSION=${{ github.event.inputs.hermes_version || '0.15.2' }}
