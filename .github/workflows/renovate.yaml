name: Renovate

on:
  schedule:
    # Hourly; adjust or rely on workflow_dispatch for on-demand runs.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Renovate log level'
        required: false
        default: 'info'
      dryRun:
        description: 'Dry run (no PRs/commits): true to enable'
        required: false
        default: 'false'
  push:
    branches:
      - main
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate.yaml'

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: renovate.json
          # PAT (classic: repo + workflow, or fine-grained equiv). A dedicated
          # token is required so Renovate-opened PRs can trigger other workflows
          # (e.g. build-hermes) and so automerge works.
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_AUTODISCOVER: 'false'
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dryRun == 'true' && 'full' || '' }}
