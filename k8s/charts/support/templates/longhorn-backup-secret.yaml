{{- if .Values.longhornBackupTarget.enabled }}
---
# Reshape the Crossplane HMACKey connection secret (keys: access_id, secret)
# into the AWS_* keys Longhorn's backup-target credential secret requires.
# Source secret is created by crossplane-gcp (hmacKeys -> longhorn-gcs-hmac).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.longhornBackupTarget.credentialSecret | default "longhorn-backup-credentials" }}
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.longhornBackupTarget.kubernetesStore | default "kubernetes-longhorn-system" }}
  target:
    name: {{ .Values.longhornBackupTarget.credentialSecret | default "longhorn-backup-credentials" }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{`{{ .access_id }}`}}"
        AWS_SECRET_ACCESS_KEY: "{{`{{ .secret }}`}}"
        AWS_ENDPOINTS: {{ .Values.longhornBackupTarget.s3Endpoint | default "https://storage.googleapis.com" | quote }}
  data:
    - secretKey: access_id
      remoteRef:
        key: {{ .Values.longhornBackupTarget.hmacConnectionSecret | default "longhorn-gcs-hmac" | quote }}
        property: access_id
    - secretKey: secret
      remoteRef:
        key: {{ .Values.longhornBackupTarget.hmacConnectionSecret | default "longhorn-gcs-hmac" | quote }}
        property: secret
{{- end }}
