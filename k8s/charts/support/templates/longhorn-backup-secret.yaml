{{- if .Values.longhornBackupTarget.enabled }}
---
# Build Longhorn's S3 backup credential secret from:
#   - AWS_SECRET_ACCESS_KEY: the Crossplane HMACKey connection secret
#     (key: attribute.secret), read via the kubernetes-longhorn-system store
#   - AWS_ACCESS_KEY_ID: the HMAC access ID (not secret-sensitive, but pairs
#     with the bucket) supplied as a value from the private repo
#   - AWS_ENDPOINTS: GCS S3-interop endpoint (constant)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.longhornBackupTarget.credentialSecret | default "longhorn-backup-credentials" }}
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.longhornBackupTarget.kubernetesStore | default "kubernetes-longhorn-system" }}
  target:
    name: {{ .Values.longhornBackupTarget.credentialSecret | default "longhorn-backup-credentials" }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: {{ required "longhornBackupTarget.accessKeyId is required" .Values.longhornBackupTarget.accessKeyId | quote }}
        AWS_SECRET_ACCESS_KEY: "{{`{{ .secret_access_key }}`}}"
        AWS_ENDPOINTS: {{ .Values.longhornBackupTarget.s3Endpoint | default "https://storage.googleapis.com" | quote }}
  data:
    - secretKey: secret_access_key
      remoteRef:
        key: {{ .Values.longhornBackupTarget.hmacConnectionSecret | default "longhorn-gcs-hmac" | quote }}
        # Dotted key -> escape so gjson treats it as a literal key, not a path
        property: attribute\.secret
{{- end }}
