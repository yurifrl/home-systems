{{- range .Values.persistentVolumeClaims | default (list) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .name | required "name is required" }}
  namespace: {{ $.Release.Namespace | default .namespace }}
  {{- if .restore }}
  annotations:
    longhorn.io/volumeBackup: {{ .restore | quote }}
  {{- end }}
spec:
  accessModes:
    - {{ .accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .storage | default "10Gi" }}
  volumeMode: Filesystem
  storageClassName: {{ .storageClassName | default "longhorn-ha" }}
  {{- if .volumeName }}
  volumeName: {{ .volumeName }}
  {{- end }}
{{- end }}