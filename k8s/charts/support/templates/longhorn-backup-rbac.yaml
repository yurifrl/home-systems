{{- if .Values.longhornBackupTarget.enabled }}
---
# RBAC for configuring Longhorn backup target
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-support
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-support
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["settings"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-support
subjects:
  - kind: ServiceAccount
    name: longhorn-support
    namespace: longhorn-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-support
{{- end }}
