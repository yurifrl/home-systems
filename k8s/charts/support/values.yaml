# Persistent Volume Claims configuration
persistentVolumeClaims: []
  # - name: claim-name
  #   accessModes:
  #     - ReadWriteOnce
  #   storage: 1Gi
  #   storageClassName: local-storage
  #   volumeName: volume-name
  #   restore: ""                  # Set to a backup name to restore this PVC from backup

# Longhorn Backups configuration
# Backs up any EXISTING PVC by name, regardless of what created it
# (StatefulSet volumeClaimTemplate, Deployment-mounted PVC, upstream chart, etc).
# For each entry the support chart creates:
#   1. a Longhorn RecurringJob (the schedule)
#   2. a post-install Job that resolves the PVC -> Longhorn volume and labels it
#   3. shared RBAC so the Job can label volumes in longhorn-system
longhornBackups: []
  # - pvc: my-pvc-name           # name of an existing PVC (required)
  #   schedule: "0 2 * * 0"      # optional, default weekly Sunday 2 AM
  #   retain: 7                  # optional, default 7
  #   concurrency: 1             # optional, default 1

# Persistent Volumes configuration
persistentVolumes: []
  # - name: volume-name                 # Name of the persistent volume
  #   size: 1Gi                        # Storage capacity (e.g., 1Gi, 500Mi)
  #   accessMode: ReadWriteOnce        # Access mode (default: ReadWriteOnce)
  #   reclaimPolicy: Delete           # Volume reclaim policy (default: Delete)
  #   storageClass: local-storage     # Storage class name
  #   path: /mnt/data                 # Local path on the node
  #   nodeName: worker-node-1         # Kubernetes node name where volume exists

# Virtual Services configuration
virtualServices: []
  # - name: grafana                    # Name of the virtual service
  #   service:
  #     name: grafana-service          # Internal k8s service name
  #     namespace: monitoring          # Service namespace
  #     port: 80                       # Service port
  #   domains:                         # Control which domains to create (defaults: xyz=true, tech=false, live=false)
  #     live: false                    # Create public .syscd.live domain
  #     tech: false                    # Create private .syscd.tech domain (includes .xyz alias)
  #     xyz: true                      # Create private .syscd.xyz domain

# Deployments configuration
deployments: []
  # - name: app-name                   # Name of the deployment
  #   replicas: 1                      # Number of replicas
  #   image:
  #     repository: nginx              # Container image repository
  #     tag: latest                    # Container image tag
  #     pullPolicy: IfNotPresent       # Image pull policy
  #   containerPort: 80                # Container port
  #   env:                             # Environment variables
  #     - name: ENV_VAR
  #       value: "value"
  #   envFrom:                         # Environment variables from sources
  #     - secretRef:
  #         name: secret-name
  #   volumes:                         # Volumes configuration
  #     - name: data
  #       persistentVolumeClaim:
  #         claimName: pvc-name
  #   volumeMounts:                    # Volume mounts
  #     - name: data
  #       mountPath: /data
  #   nodeSelector:                    # Node selector
  #     key: value
  #   resources:                       # Resource limits and requests
  #     limits:
  #       cpu: 100m
  #       memory: 128Mi
  #     requests:
  #       cpu: 100m
  #       memory: 128Mi

# StatefulSets configuration
statefulSets: []
  # - name: stateful-app               # Name of the statefulset
  #   replicas: 1                      # Number of replicas
  #   serviceName: stateful-svc        # Headless service name (defaults to statefulset name)
  #   image:
  #     repository: nginx              # Container image repository
  #     tag: latest                    # Container image tag
  #     pullPolicy: IfNotPresent       # Image pull policy
  #   containerPort: 80                # Container port
  #   env:                             # Environment variables
  #     - name: ENV_VAR
  #       value: "value"
  #   envFrom:                         # Environment variables from sources
  #     - secretRef:
  #         name: secret-name
  #   volumes:                         # Non-persistent volumes configuration
  #     - name: config
  #       configMap:
  #         name: app-config
  #   volumeMounts:                    # Volume mounts
  #     - name: data
  #       mountPath: /data
  #     - name: config
  #       mountPath: /config
  #   volumeClaimTemplates:            # PVC templates for stable storage
  #     - name: data
  #       accessModes:
  #         - ReadWriteOnce
  #       storage: 10Gi
  #       storageClassName: standard
  #   nodeSelector:                    # Node selector
  #     key: value
  #   resources:                       # Resource limits and requests
  #     limits:
  #       cpu: 100m
  #       memory: 128Mi
  #     requests:
  #       cpu: 100m
  #       memory: 128Mi

# Global settings
global:
  domains:
    live: true
    tech: true
    xyz: true
    dev: true

# SLO settings
slos:
  enabled: false

# Probes settings
probes:
  enabled: false

# Services
services: []
  # - name: service-name
  #   port: 80
  #   targetPort: 80

# External Secrets configuration
externalSecrets: []
  # - name: teleport-agent-token      # This matches the 1Password item name
  #   namespace: teleport             # Kubernetes namespace
  #   decodingStrategy: None          # Decoding strategy (default: None)

# ConfigMaps configuration
configMaps: []
  # - name: config-name
  #   data:
  #     key1: value1
  #     key2: |
  #       multiline
  #       value
# Longhorn Backup Target configuration
longhornBackupTarget:
  enabled: false
  onePasswordItem: "longhorn"
  secretName: "longhorn-backup-target"
