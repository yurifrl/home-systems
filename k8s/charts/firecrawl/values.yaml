# This is a LOCAL FORK of upstream firecrawl/firecrawl/examples/kubernetes/firecrawl-helm.
# Pinned to commit 42b46be4f75a (see .upstream-sha). The only divergence from
# upstream is a `global.{nodeSelector,tolerations}` block applied to the 6
# heavy deployments (api, worker, nuq-worker, nuq-prefetch-worker,
# extract-worker, playwright). Stateful pods (postgres, rabbitmq, redis)
# are left unpatched so the upstream chart can keep evolving them freely.
# Set the actual node pin in k8s/applications/firecrawl.yaml's valuesObject.
global:
  nodeSelector: {}
  tolerations: []

replicaCount: 1

resources:
  enabled: false

api:
  replicaCount: 1
  resources:
    requests:
      memory: "4G"
      cpu: "2000m"
    limits:
      memory: "6G"
      cpu: "2000m"

worker:
  replicaCount: 1
  port: 3005
  resources:
    requests:
      memory: "3G"
      cpu: "1000m"
    limits:
      memory: "4G"
      cpu: "1000m"

extractWorker:
  enabled: true
  replicaCount: 1
  port: 3004
  resources:
    requests:
      memory: "2G"
      cpu: "1000m"
    limits:
      memory: "3G"
      cpu: "1000m"

nuqWorker:
  replicaCount: 5
  port: 3006
  resources:
    requests:
      memory: "3G"
      cpu: "1000m"
    limits:
      memory: "4G"
      cpu: "1000m"

nuqPrefetchWorker:
  enabled: true
  replicaCount: 1
  port: 3011
  resources:
    requests:
      memory: "1G"
      cpu: "500m"
    limits:
      memory: "2G"
      cpu: "1000m"

nuqPostgres:
  replicaCount: 1
  image:
    repository: ghcr.io/firecrawl/nuq-postgres
    tag: latest
    pullPolicy: Always
  auth:
    username: postgres
    password: password
    database: postgres
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  persistence:
    enabled: false
    size: 10Gi
    storageClass: ""

rabbitmq:
  enabled: true
  image: rabbitmq:4-management
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

image:
  repository: ghcr.io/firecrawl/firecrawl
  tag: "latest"
  pullPolicy: Always
  dockerSecretEnabled: false

playwright:
  repository: ghcr.io/firecrawl/playwright-service
  tag: "latest"
  pullPolicy: Always
  replicaCount: 1

redis:
  image: redis:alpine
  replicaCount: 1

service:
  api:
    type: ClusterIP
    port: 3002
  playwright:
    type: ClusterIP
    port: 3000
  redis:
    type: ClusterIP
    port: 6379
  rabbitmq:
    type: ClusterIP
    port: 5672
    managementPort: 15672

config:
  NUM_WORKERS_PER_QUEUE: "8"
  PORT: "3002"
  HOST: "0.0.0.0"
  WORKER_PORT: "3005"
  EXTRACT_WORKER_PORT: "3004"
  NUQ_WORKER_PORT: "3006"
  NUQ_PREFETCH_WORKER_PORT: "3011"
  NUQ_WORKER_COUNT: "5"
  USE_DB_AUTHENTICATION: "false"
  IS_KUBERNETES: "true"
  ENV: "production"
  LOGGING_LEVEL: "INFO"
  FIRECRAWL_APP_SCHEME: "http"
  FIRECRAWL_APP_HOST: ""
  FIRECRAWL_APP_PORT: ""
  REDIS_URL: ""
  REDIS_RATE_LIMIT_URL: ""
  PLAYWRIGHT_MICROSERVICE_URL: ""
  NUQ_DATABASE_URL: ""
  NUQ_DATABASE_URL_LISTEN: ""
  NUQ_RABBITMQ_URL: ""
  OPENAI_BASE_URL: ""
  MODEL_NAME: ""
  MODEL_EMBEDDING_NAME: ""
  OLLAMA_BASE_URL: ""
  PROXY_SERVER: ""
  PROXY_USERNAME: ""
  SEARXNG_ENDPOINT: ""
  SEARXNG_ENGINES: ""
  SEARXNG_CATEGORIES: ""
  SELF_HOSTED_WEBHOOK_URL: ""
  extra: {}

playwrightConfig:
  PORT: "3000"
  ALLOW_LOCAL_WEBHOOKS: ""
  BLOCK_MEDIA: ""
  MAX_CONCURRENT_PAGES: "10"

secret:
  OPENAI_API_KEY: ""
  SLACK_WEBHOOK_URL: ""
  LLAMAPARSE_API_KEY: ""
  BULL_AUTH_KEY: ""
  TEST_API_KEY: ""
  FIRE_ENGINE_BETA_URL: ""
  SUPABASE_ANON_TOKEN: ""
  SUPABASE_URL: ""
  SUPABASE_SERVICE_TOKEN: ""
  PROXY_PASSWORD: ""
  SELF_HOSTED_WEBHOOK_HMAC_SECRET: ""
  REDIS_PASSWORD: ""
  extra: {}

imagePullSecrets:
  - name: docker-registry-secret
