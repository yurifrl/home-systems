apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-obs
  namespace: obs
data:
  config.yaml: |
    tunnel: 248f4b51-d33d-4896-89c1-acb748c54330
    credentials-file: /creds/credentials.json
    no-autoupdate: true
    protocol: http2
    ingress:
      - hostname: obs.syscd.live
        service: http://localhost:8080
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-obs
  namespace: obs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared-obs
  template:
    metadata:
      labels:
        app: cloudflared-obs
    spec:
      # MUST run on macintel01: only the node itself can reach restreamer
      # (localhost:8080). cloudflared only makes outbound conns to Cloudflare.
      hostNetwork: true
      # Default (host resolv.conf), not ClusterFirstWithHostNet: cloudflared only
      # resolves the CF edge; routing DNS via CoreDNS (10.96.0.10) over macintel01's
      # flaky cilium datapath caused 'region1.v2.argotunnel.com: i/o timeout' -> tunnel drops.
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/hostname: macintel01
      tolerations:
        - key: node.cilium.io/agent-not-ready
          operator: Exists
        # macintel01 is intentionally cordoned; this pinned pod must still
        # (re)schedule there, else a restart hangs Pending. Targeted — only
        # this pod ignores the cordon, not the whole node.
        - key: node.kubernetes.io/unschedulable
          operator: Exists
          effect: NoSchedule
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args: ["tunnel", "--config", "/config/config.yaml", "run"]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: creds
              mountPath: /creds
              readOnly: true
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 128Mi }
      volumes:
        - name: config
          configMap:
            name: cloudflared-obs
        - name: creds
          secret:
            secretName: cloudflare-tunnel-secret-2
