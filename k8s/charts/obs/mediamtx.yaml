apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx
  namespace: obs
data:
  mediamtx.yml: |
    logLevel: info
    api: yes
    apiAddress: :9997
    hlsAddress: :8888
    hlsAlwaysRemux: yes
    paths:
      obs:
        # OBS assumed to be an SRT listener at 192.168.0.25:1234.
        # MediaMTX connects as caller and republishes as HLS/RTSP.
        source: srt://192.168.0.25:1234
        sourceOnDemand: no
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediamtx
  namespace: obs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediamtx
  template:
    metadata:
      labels:
        app: mediamtx
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # macintel01 is the only node on the OBS LAN (192.168.0.0/24), so it is
      # the only node that can reach the SRT source at 192.168.0.25:1234.
      nodeSelector:
        kubernetes.io/hostname: macintel01
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
      containers:
        - name: mediamtx
          image: bluenviron/mediamtx:latest
          args: ["/mediamtx.yml"]
          ports:
            - { name: hls, containerPort: 8888, protocol: TCP }
            - { name: rtsp, containerPort: 8554, protocol: TCP }
            - { name: api, containerPort: 9997, protocol: TCP }
          volumeMounts:
            - name: cfg
              mountPath: /mediamtx.yml
              subPath: mediamtx.yml
      volumes:
        - name: cfg
          configMap:
            name: mediamtx
---
apiVersion: v1
kind: Service
metadata:
  name: mediamtx
  namespace: obs
spec:
  type: NodePort
  selector:
    app: mediamtx
  ports:
    - { name: hls, port: 8888, targetPort: 8888, nodePort: 30888 }
    - { name: rtsp, port: 8554, targetPort: 8554, nodePort: 30554 }
    - { name: api, port: 9997, targetPort: 9997, nodePort: 30997 }
