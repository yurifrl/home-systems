apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-secret-2
  namespace: obs
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-tunnel-secret-2
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: cloudflare-tunnel-secret-2
---
# Restreamer admin login + JWT signing key. Populate a 1Password item named
# "restreamer" with fields: username, password, jwt-secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restreamer
  namespace: obs
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: restreamer
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: restreamer
