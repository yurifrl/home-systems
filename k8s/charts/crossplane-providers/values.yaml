# Pin provider runtime pods to a CPU arch via a shared DeploymentRuntimeConfig.
# Several community images (e.g. wildbitca cloudflare) are amd64-only and
# ImagePullBackOff on the lone arm64 node; every Provider below references this.
runtimeConfigName: amd64-only
runtimeArch: amd64

# Dedicated runtime config for providers that need a stable API path. Keep them
# on pc01 and bypass the kube-proxy Service VIP.
pinnedRuntimeConfig:
  name: gcp-storage-pinned
  nodeHostname: pc01
  apiserverHost: "192.168.68.100"
  apiserverPort: "6443"

# Crossplane provider packages to install (Crossplane v2.3.3; cluster-scoped MRs).
providers:
  - name: provider-gcp-storage
    package: xpkg.upbound.io/upbound/provider-gcp-storage:v2.5.4
    # A missing conversion webhook stalls every ArgoCD application.
    runtimeConfig: gcp-storage-pinned
  - name: provider-gcp-cloudplatform
    package: xpkg.upbound.io/upbound/provider-gcp-cloudplatform:v2.5.4
  - name: provider-gcp-iam
    package: xpkg.upbound.io/upbound/provider-gcp-iam:v2.5.4
  # Compute provider for the assets CDN (LB + Cloud CDN + Cloud Armor). Its MRDs
  # install INACTIVE (default MRAP no longer activates '*'); only the ~8 CRDs in
  # the computeCdnActivations MRAP below become CRDs, avoiding the apiserver
  # overload that forced this provider's earlier removal. Unpinned — runs on any
  # healthy worker.
  - name: provider-gcp-compute
    package: xpkg.upbound.io/upbound/provider-gcp-compute:v2.5.4
  # Cloudflare DNS + Rulesets (WAF/rate-limit/geo) for the assets CDN, so the
  # DNS record + rate-limit/geo rules reconcile from git once the API token is
  # present. Same wildbitca family as provider-cloudflare-zero. MRD-scoped by
  # the cloudflare-cdn MRAP so only Record + Ruleset CRDs activate.
  - name: provider-cloudflare-dns
    package: xpkg.upbound.io/wildbitca/provider-cloudflare-dns:v0.2.13
  - name: provider-cloudflare-cloudflare
    package: xpkg.upbound.io/wildbitca/provider-cloudflare-cloudflare:v0.2.13
  # Proxmox VE provider (Upjet-generated wrapper around bpg/terraform-provider-proxmox).
  # Community provider; manages QEMU VMs as cluster-scoped managed resources
  # (group virtualenvironmentvm.proxmoxbpg.crossplane.io). Used by the
  # crossplane-proxmox chart to replicate the proxmox/ VM configs.
  - name: provider-proxmox-bpg
    package: xpkg.upbound.io/valkiriaaquaticamendi/provider-proxmox-bpg:v1.15.0
  # Cloudflare Zero Trust (Upjet, Cloudflare TF v5). Consumed by a private app
  # to manage Access App + Service Token + Policy.
  - name: provider-cloudflare-zero
    package: xpkg.upbound.io/wildbitca/provider-cloudflare-zero:v0.2.6

# ExternalSecret that materialises the GCP service-account key JSON used by the
# ProviderConfig. The 1Password item must expose a field whose value is the raw
# SA key JSON, surfaced under the secret key `creds`.
gcpCredentials:
  enabled: true
  # k8s Secret name consumed by the ProviderConfig credentials.secretRef.
  secretName: gcp-creds
  # 1Password item key (ClusterSecretStore "onepassword").
  onepasswordKey: crossplane-gcp
  # Key inside the synced Secret holding the SA key JSON.
  credentialsKey: creds

# The `default` MRAP activate list. Replaces crossplane core's ["*"] so heavy
# providers install their MRDs Inactive (no CRD, no apiserver load). One glob per
# active provider family (both legacy .upbound.io and modern .m.upbound.io).
defaultActivations:
  - "*.storage.gcp.upbound.io"
  - "*.storage.gcp.m.upbound.io"
  - "*.iam.gcp.upbound.io"
  - "*.iam.gcp.m.upbound.io"
  - "*.cloudplatform.gcp.upbound.io"
  - "*.cloudplatform.gcp.m.upbound.io"
  - "*.proxmoxbpg.crossplane.io"
  - "*.proxmoxbpg.m.crossplane.io"
  - "*.zero.upjet-cloudflare.upbound.io"
  - "*.zero.upjet-cloudflare.m.upbound.io"

# MRAP that activates ONLY the compute CRDs the assets CDN needs (both the
# legacy .upbound.io and modern .m.upbound.io variants). Everything else in
# provider-gcp-compute stays an Inactive MRD -> no CRD, no apiserver load.
# Verify exact plurals after install: kubectl get mrds | grep compute.gcp
computeCdnActivations:
  - backendbuckets.compute.gcp.upbound.io
  - backendbuckets.compute.gcp.m.upbound.io
  - urlmaps.compute.gcp.upbound.io
  - urlmaps.compute.gcp.m.upbound.io
  - targethttpsproxies.compute.gcp.upbound.io
  - targethttpsproxies.compute.gcp.m.upbound.io
  - globalforwardingrules.compute.gcp.upbound.io
  - globalforwardingrules.compute.gcp.m.upbound.io
  - globaladdresses.compute.gcp.upbound.io
  - globaladdresses.compute.gcp.m.upbound.io
  - managedsslcertificates.compute.gcp.upbound.io
  - managedsslcertificates.compute.gcp.m.upbound.io
  - sslcertificates.compute.gcp.upbound.io
  - sslcertificates.compute.gcp.m.upbound.io
  - securitypolicies.compute.gcp.upbound.io
  - securitypolicies.compute.gcp.m.upbound.io

# Cloudflare CRDs to activate (DNS Record + WAF Ruleset). Everything else in the
# cloudflare families stays an Inactive MRD. Verify plurals after install.
cloudflareCdnActivations:
  - records.dns.upjet-cloudflare.upbound.io
  - records.dns.upjet-cloudflare.m.upbound.io
  - rulesets.cloudflare.upjet-cloudflare.upbound.io
  - rulesets.cloudflare.upjet-cloudflare.m.upbound.io

# Cloudflare ProviderConfig: reuses the existing cloudflare-creds secret (the
# API token JSON lives in the 1Password item that feeds it).
cloudflareCredentials:
  enabled: true
  secretName: cloudflare-creds
  credentialsKey: credentials
  # 1Password item + field holding the Cloudflare API token (reuses the one
  # external-dns syncs). The token must have zone DNS:Edit for syscd.live (and
  # Zone WAF:Edit + SSL:Edit for the later ruleset/cert work).
  onepasswordKey: externaldns-cloudflare
  tokenProperty: cloudflare_api_token
