{{- /*
  Pin Crossplane provider RUNTIME pods to a CPU arch. Several community provider
  images (e.g. wildbitca cloudflare) are amd64-only and ImagePullBackOff if they
  land on the lone arm64 node. Each Provider references this via runtimeConfigRef.
*/ -}}
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: {{ .Values.runtimeConfigName }}
spec:
  deploymentTemplate:
    spec:
      selector: {}
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: {{ .Values.runtimeArch }}
          # containers is a required field on the DeploymentRuntimeConfig pod
          # template; the name is the strategic-merge key, so this only sets the
          # nodeSelector without otherwise altering the package-runtime container.
          containers:
            - name: package-runtime
