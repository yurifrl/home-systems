{{- if .Values.isoPipeline.enabled }}
{{- $p := .Values.isoPipeline }}
{{- if $p.externalSecret }}
# GCS service-account key for the ISO pipeline (build upload + URL signing).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $p.gcsKeySecret }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef: {name: onepassword, kind: ClusterSecretStore}
  target:
    name: {{ $p.gcsKeySecret }}
  data:
    - secretKey: key.json
      remoteRef: {key: {{ $p.gcsOnepasswordItem }}, property: {{ $p.gcsOnepasswordProperty }}}
---
# Windows local-admin password, injected into autounattend.xml at build time.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $p.winAdminSecret }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef: {name: onepassword, kind: ClusterSecretStore}
  target:
    name: {{ $p.winAdminSecret }}
  data:
    - secretKey: password
      remoteRef: {key: {{ $p.winAdminOnepasswordItem }}, property: password}
{{- end }}
{{- end }}
