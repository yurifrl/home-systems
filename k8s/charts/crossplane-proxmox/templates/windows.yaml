{{- $v := .Values.vms.windows }}
{{- if $v.enabled }}
{{- $d := .Values.defaults }}
apiVersion: virtualenvironmentvm.proxmoxbpg.crossplane.io/v1alpha1
kind: EnvironmentVM
metadata:
  name: {{ $v.name }}
  annotations:
    # Import/own VM by its bare numeric id (the bpg provider Atoi's external-name).
    crossplane.io/external-name: {{ $v.vmId | quote }}
spec:
  deletionPolicy: {{ .Values.deletionPolicy }}
  providerConfigRef:
    name: {{ .Values.providerConfig.name }}
  forProvider:
    nodeName: {{ $d.nodeName }}
    vmId: {{ $v.vmId }}
    name: {{ $v.name }}
    bios: {{ $v.bios }}
    machine: {{ $v.machine }}
    scsiHardware: {{ $v.scsiHardware }}
    onBoot: {{ $v.onBoot }}
    started: {{ $v.started | default .Values.started }}
    bootOrder:
      {{- range $v.bootOrder }}
      - {{ . }}
      {{- end }}
    agent:
      - enabled: true
    operatingSystem:
      - type: {{ $v.osType }}
    cpu:
      - cores: {{ $v.cpu.cores }}
        sockets: {{ $v.cpu.sockets }}
        type: {{ $v.cpu.type | quote }}
        flags:
          {{- range $v.cpu.flags }}
          - {{ . | quote }}
          {{- end }}
    memory:
      - dedicated: {{ $v.memoryMiB }}
    smbios:
      - uuid: {{ $v.smbiosUuid }}
    networkDevice:
      - bridge: {{ $d.bridge }}
        model: virtio
        macAddress: {{ $v.netMac }}
        firewall: true
    {{- if $v.vga }}
    vga:
      - type: {{ $v.vga }}
    {{- end }}
    disk:
      - datastoreId: {{ $d.datastoreId }}
        interface: {{ $v.disk.interface }}
        size: {{ $v.disk.sizeGiB }}
        iothread: {{ $v.disk.iothread | default false }}
    efiDisk:
      - datastoreId: {{ $d.datastoreId }}
        type: {{ $v.efiDisk.type | quote }}
        preEnrolledKeys: {{ $v.efiDisk.preEnrolledKeys }}
    tpmState:
      - datastoreId: {{ $d.datastoreId }}
        version: {{ $v.tpmState.version | quote }}
    cdrom:
      - enabled: true
        interface: {{ $v.cdrom.interface }}
        fileId: {{ $v.cdrom.fileId }}
    {{- if $v.passthrough }}
    hostpci:
      {{- range $v.hostpci }}
      - device: {{ .device }}
        id: {{ .id | quote }}
        pcie: {{ .pcie | default false }}
        {{- if .xvga }}
        xvga: {{ .xvga }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
