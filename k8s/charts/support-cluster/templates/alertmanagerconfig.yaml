# https://docs.victoriametrics.com/operator/resources/vmalertmanagerconfig
# VMAlertmanager (k8s/applications/victoria-metrics-k8s-stack.yaml) selects this
# CR via selectAllByDefault and merges it into the generated alertmanager config.
# Namespace matching is disabled on the VMAlertmanager so alerts from any
# namespace can route here.
{{- if .Values.features.alertmanager }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    role: alert-rules
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  route:
    receiver: discord
    group_by:
      - alertname
      - severity
      - slo
      - environment
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: discord
        matchers:
          - 'severity="critical"'
          - 'environment="production"'
        continue: false
  receivers:
    - name: discord
      discord_configs:
        - webhook_url_secret:
            name: alertmanager-discord
            key: webhook-url
          message: |
            {{`{{ .CommonLabels.alertname }}`}} {{`{{ .CommonLabels.severity }}`}} {{`{{ .CommonLabels.slo }}`}}
          title: "{{`{{ .CommonLabels.alertname }}`}}"
          send_resolved: true
    - name: "null"
{{- end }}
