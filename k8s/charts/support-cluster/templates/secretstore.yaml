---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.1password.svc.cluster.local:8080
      vaults:
        kubernetes: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-credentials
            key: token
            namespace: 1password
---
# Kubernetes-provider store: lets ExternalSecrets reshape in-cluster secrets in
# longhorn-system (e.g. remap a Crossplane HMACKey connection secret into the
# AWS_* keys Longhorn's backup-target credential secret requires).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kubernetes-longhorn-system
spec:
  provider:
    kubernetes:
      remoteNamespace: longhorn-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: longhorn-system
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-longhorn-reader
          namespace: longhorn-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-longhorn-reader
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-longhorn-reader
  namespace: longhorn-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-longhorn-reader
  namespace: longhorn-system
subjects:
  - kind: ServiceAccount
    name: eso-longhorn-reader
    namespace: longhorn-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-longhorn-reader