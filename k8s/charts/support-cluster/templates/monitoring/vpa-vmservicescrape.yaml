{{- if eq .Values.monitoringProvider "victoriametrics" }}
# VMServiceScrape resources for Vertical Pod Autoscaler
# Use when cluster has VictoriaMetrics operator installed
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: vertical-pod-autoscaler-recommender
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/component: recommender
      app.kubernetes.io/name: vertical-pod-autoscaler
  namespaceSelector:
    matchNames:
    - vpa
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: vertical-pod-autoscaler-admission-controller
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/name: vertical-pod-autoscaler
  namespaceSelector:
    matchNames:
    - vpa
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: vertical-pod-autoscaler-updater
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/component: updater
      app.kubernetes.io/name: vertical-pod-autoscaler
  namespaceSelector:
    matchNames:
    - vpa
{{- end }}
