{{- if eq .Values.monitoringProvider "victoriametrics" }}
# cloudflare-tunnel (main nixos-1 tunnel) health monitoring.
# The tunnel is a single point of failure fronting all *.syscd.live services;
# cloudflared exposes Prometheus metrics on :2000 (metrics: 0.0.0.0:2000 in its
# config). We scrape cloudflared_tunnel_ha_connections and page when it hits 0
# (or the target disappears) — one SPOF symptom alert covering every tunnel-
# fronted service. See:
# .agents/postmortems/2026-07-05-cloudflare-tunnel-quic-edge-unreachable/PM.md
---
apiVersion: v1
kind: Service
metadata:
  name: cloudflare-tunnel-metrics
  namespace: cloudflare-tunnel
  labels:
    app.kubernetes.io/name: cloudflare-tunnel
    monitoring: cloudflare-tunnel-metrics
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: cloudflare-tunnel
  ports:
    - name: metrics
      port: 2000
      targetPort: 2000
      protocol: TCP
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: cloudflare-tunnel
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
  selector:
    matchLabels:
      monitoring: cloudflare-tunnel-metrics
  namespaceSelector:
    matchNames:
      - cloudflare-tunnel
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: cloudflare-tunnel-rules
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  groups:
    - name: cloudflare-tunnel.rules
      rules:
        - alert: CloudflareTunnelDown
          expr: |
            (sum(cloudflared_tunnel_ha_connections) == 0)
            or
            (absent(cloudflared_tunnel_ha_connections) == 1)
          for: 3m
          labels:
            severity: critical
            environment: production
            service: cloudflare-tunnel
          annotations:
            summary: "Cloudflare tunnel has no active connections"
            description: "cloudflared (nixos-1) has 0 registered edge connections (or its metrics target is gone) for 3m. ALL *.syscd.live services are returning Cloudflare Error 1033/524. Runbook: .agents/postmortems/2026-07-05-cloudflare-tunnel-quic-edge-unreachable/PM.md — usually QUIC-to-edge failure; force protocol http2."
{{- end }}
