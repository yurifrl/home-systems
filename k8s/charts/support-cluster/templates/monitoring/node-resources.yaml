# Node resource-depletion alerts (CPU, memory, load), evaluated by VMAlert
# (selectAllByDefault) and routed to discord via the VMAlertmanagerConfig in
# this chart. Disk/inode depletion is covered separately in disk.yaml.
#
# All exprs filter to job=~".*node-exporter.*" so the duplicate
# kubernetes-services-annotations scrape of node-exporter is excluded and each
# node is only counted once.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: node-resources-rules
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  groups:
    # ----------------------------------------------------------------
    # Memory (node-exporter)
    # ----------------------------------------------------------------
    - name: node-memory.rules
      rules:
        - alert: NodeMemoryHigh
          expr: |
            (
              node_memory_MemAvailable_bytes{job=~".*node-exporter.*"}
              / node_memory_MemTotal_bytes{job=~".*node-exporter.*"} * 100 < 15
            )
          for: 15m
          labels:
            severity: warning
            service: node-memory
          annotations:
            summary: "Node memory is running low"
            description: "Node {{ `{{ $labels.instance }}` }} has only {{ `{{ printf \"%.1f\" $value }}` }}% memory available."

        - alert: NodeMemoryCritical
          expr: |
            (
              node_memory_MemAvailable_bytes{job=~".*node-exporter.*"}
              / node_memory_MemTotal_bytes{job=~".*node-exporter.*"} * 100 < 8
            )
          for: 5m
          labels:
            severity: critical
            environment: production
            service: node-memory
          annotations:
            summary: "Node memory is critically low"
            description: "Node {{ `{{ $labels.instance }}` }} has only {{ `{{ printf \"%.1f\" $value }}` }}% memory available. OOM kills are imminent."

    # ----------------------------------------------------------------
    # CPU saturation (node-exporter)
    # Utilisation = 1 - idle rate, averaged across all cores per instance.
    # ----------------------------------------------------------------
    - name: node-cpu.rules
      rules:
        - alert: NodeCPUHigh
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{job=~".*node-exporter.*",mode="idle"}[5m])
              )
            ) * 100 > 90
          for: 15m
          labels:
            severity: warning
            service: node-cpu
          annotations:
            summary: "Node CPU utilisation is high"
            description: "Node {{ `{{ $labels.instance }}` }} CPU utilisation has been above 90% ({{ `{{ printf \"%.1f\" $value }}` }}%) for 15m."

        - alert: NodeCPUCritical
          expr: |
            (
              1 - avg by (instance) (
                rate(node_cpu_seconds_total{job=~".*node-exporter.*",mode="idle"}[5m])
              )
            ) * 100 > 97
          for: 30m
          labels:
            severity: critical
            environment: production
            service: node-cpu
          annotations:
            summary: "Node CPU is saturated"
            description: "Node {{ `{{ $labels.instance }}` }} CPU utilisation has been above 97% ({{ `{{ printf \"%.1f\" $value }}` }}%) for 30m."

    # ----------------------------------------------------------------
    # Load average relative to core count (node-exporter)
    # ----------------------------------------------------------------
    - name: node-load.rules
      rules:
        - alert: NodeLoadHigh
          expr: |
            (
              node_load5{job=~".*node-exporter.*"}
              / count by (instance) (node_cpu_seconds_total{job=~".*node-exporter.*",mode="idle"})
            ) > 2
          for: 15m
          labels:
            severity: warning
            service: node-load
          annotations:
            summary: "Node load average exceeds 2x core count"
            description: "Node {{ `{{ $labels.instance }}` }} 5m load average is {{ `{{ printf \"%.2f\" $value }}` }}x the number of CPU cores."
