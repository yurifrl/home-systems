{{- if eq .Values.monitoringProvider "prometheus-operator" }}
# ServiceMonitor resources for Vertical Pod Autoscaler
# Use when cluster has Prometheus Operator (monitoring.coreos.com) CRDs installed
# Note: The VPA application should have serviceMonitor.enabled: false to avoid conflicts,
# as these ServiceMonitors are managed by support-cluster chart instead.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vertical-pod-autoscaler-recommender
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/component: recommender
      app.kubernetes.io/name: vertical-pod-autoscaler
  namespaceSelector:
    matchNames:
    - vpa
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vertical-pod-autoscaler-admission-controller
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/name: vertical-pod-autoscaler
  namespaceSelector:
    matchNames:
    - vpa
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vertical-pod-autoscaler-updater
  namespace: monitoring
  labels:
    prometheus: k8s
spec:
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  selector:
    matchLabels:
      app.kubernetes.io/component: updater
      app.kubernetes.io/name: vertical-pod-autoscaler
  namespaceSelector:
    matchNames:
    - vpa
{{- end }}
