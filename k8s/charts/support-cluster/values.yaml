# Global monitoring stack provider: "victoriametrics" or "prometheus-operator"
# This determines whether VMServiceScrape (VictoriaMetrics) or ServiceMonitor (Prometheus Operator) resources are used
monitoringProvider: victoriametrics

# Feature flags for enabling different components
features:
  serviceLevelObjectives: false 
  prometheusRules: false
  alertmanager: true
  tailscale: true
  defaultServiceAccountWithImagePullSecret: true
  defaultLimitRange: true

# Namespaces to create default ServiceAccount with image pull secret
# Requires features.defaultServiceAccountWithImagePullSecret: true
serviceAccountsWithImagePullSecret: []
  # - namespace: my-namespace

# Default requests/limits for containers that don't set their own (one
# LimitRange per listed namespace). Requests stop the scheduler from
# overcommitting nodes; the limit caps runaway pods. Heavy apps should still
# set their own resources — LimitRange only fills the gaps, it never overrides.
# Requires features.defaultLimitRange: true
limitRanges:
  default:            # ceiling if a container sets no limit (generous, to avoid OOMing heavy apps)
    memory: 1Gi
  defaultRequest:     # reserved for scheduling if a container sets no request
    # 50m/128Mi = the common VPA target across the app fleet (2026-07-02 metrics)
    cpu: 50m
    memory: 128Mi
  # App namespaces only. Infra/system namespaces (kube-system, longhorn-system,
  # monitoring, cnpg-system, databases, supabase, istio-system, crossplane-system,
  # etc.) are omitted — their pods need bespoke sizing.
  namespaces:
    - agents
    - bind9
    - board-games
    - camofox
    - cloudflare-tunnel
    - dolt
    - edge
    - external-dns
    - gha-runner
    - hermes
    - home-assistant
    - litellm
    - mosquitto
    - obs
    - obsidian
    - ourtube
    - syscd-app
    - zigbee2mqtt


# Disable NIC TX checksum offload on Proxmox/virtio VM nodes where it corrupts
# VXLAN-encapsulated TCP/UDP (cross-node pod traffic silently dropped; ICMP
# survives, node looks healthy). Confirmed root cause on pc01 2026-07-05. The
# setting reverts on reboot/link-reset, so a DaemonSet re-applies it in a loop.
# nodeSelector scopes it to affected nodes only (offload-off costs throughput on
# nodes that don't need it). Add more Proxmox/UTM virtio nodes here as needed.
nicOffloadFix:
  enabled: true
  image: nicolaka/netshoot:v0.13
  reapplySeconds: 60
  nodeSelector:
    kubernetes.io/hostname: pc01

# Tailscale
tailscale:
  connectors:
    - hostname: tailscale-1
      advertiseRoutes:
        - 10.244.0.0/16
        - 192.168.50.0/24
        - 10.0.0.0/16
        - 10.1.0.0/16
        - 10.69.0.0/16