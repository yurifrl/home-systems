suite: test support-cluster chart
templates:
  - tailscale/connector.yaml
  - monitoring/cloudflare-tunnel.yaml
  - monitoring/victoriametrics-watchdog.yaml
tests:
  - it: should render connector correctly
    template: tailscale/connector.yaml
    values:
      - ../test.yaml
    asserts:
      - isKind:
          of: Connector
      - equal:
          path: spec.hostname
          value: tailscale-1
      - equal:
          path: spec.subnetRouter.advertiseRoutes[0]
          value: "10.244.0.0/16"
      - contains:
          path: spec.tags
          content: tag:k8s

  - it: should not treat missing Cloudflare metrics as a tunnel outage
    template: monitoring/cloudflare-tunnel.yaml
    documentIndex: 2
    asserts:
      - notMatchRegex:
          path: spec.groups[0].rules[0].expr
          pattern: "absent"

  - it: should render the independent VictoriaMetrics watchdog
    template: monitoring/victoriametrics-watchdog.yaml
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "* * * * *"
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid
      - matchRegex:
          path: spec.jobTemplate.spec.template.spec.containers[0].args[0]
          pattern: "vmalertmanager-vmks:9093/api/v2/alerts"
