{{- if and .Values.networkPolicy.enabled .Values.repositorySync.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hermes-agent.repositorySyncName" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "hermes-agent.repositorySyncName" . }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
