{{- if .Values.pages.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermes-agent.pagesName" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "hermes-agent.pagesName" . }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.pages.port }}
{{- end }}
