{{- if and .Values.networkPolicy.enabled .Values.dashboard.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "hermes-agent.dashboardName" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "hermes-agent.dashboardName" . }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: {{ .Values.dashboard.port }}
{{- end }}
