{{- if .Values.files.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.files.secretName }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.files.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
    name: {{ .Values.externalSecret.secretStoreRef.name }}
  target:
    name: {{ .Values.files.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  {{- if .Values.files.attachments }}
  # 1Password file ATTACHMENTS are retrieved by exact file Name via property
  # (extract/find only return text fields). Names are private -> set them in
  # the home-systems-values repo, never in this public chart.
  data:
    {{- range .Values.files.attachments }}
    - secretKey: {{ . | quote }}
      remoteRef:
        key: {{ $.Values.files.itemKey | quote }}
        property: {{ . | quote }}
    {{- end }}
  {{- else }}
  # No attachment names configured: fall back to text-field extract.
  dataFrom:
    - extract:
        key: {{ .Values.files.itemKey | quote }}
  {{- end }}
{{- end }}
