nameOverride: ""
fullnameOverride: ""

# home-systems image (built by .github/workflows/build-hermes.yaml).
image:
  repository: ghcr.io/yurifrl/hermes-agent
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

replicaCount: 1
revisionHistoryLimit: 5

updateStrategy:
  type: RollingUpdate
podManagementPolicy: OrderedReady

command: []
args:
  - gateway
  - run
workingDir: /opt/hermes

bootstrap:
  enabled: true
  # Seed config.yaml/SOUL.md only if absent — preserve the persisted volume.
  overwrite: false
  existingConfigMap: ""
  configKey: config.yaml
  soulKey: SOUL.md

config:
  raw: ""
  values:
    model:
      # Inference flows through LiteLLM (OPENAI_BASE_URL) which is OpenAI-compat.
      provider: openai-api
      default: gpt
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      tool_use_enforcement: auto
    terminal:
      backend: local
      cwd: .
      timeout: 180
    display:
      tool_progress: all
      interim_assistant_messages: true
    browser:
      inactivity_timeout: 120
      command_timeout: 30
      allow_private_urls: false
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
    security:
      redact_secrets: true
      tirith_enabled: true
      tirith_fail_open: true

soul:
  text: ""

# Non-secret env defaults. Secrets are loaded via the hermes-env ExternalSecret
# (envFrom). HOME is set automatically by the chart to <mountPath>/home.
env:
  WEB_TOOLS_DEBUG: "false"
  VISION_TOOLS_DEBUG: "false"
  MOA_TOOLS_DEBUG: "false"
  IMAGE_TOOLS_DEBUG: "false"
  HERMES_HUMAN_DELAY_MODE: "off"
  HERMES_HUMAN_DELAY_MIN_MS: "800"
  HERMES_HUMAN_DELAY_MAX_MS: "2500"
  GATEWAY_ALLOW_ALL_USERS: "false"
  WHATSAPP_ENABLED: "false"
  WHATSAPP_ALLOWED_USERS: ""
  TELEGRAM_ALLOWED_USERS: ""
  TELEGRAM_HOME_CHANNEL: ""
  DISCORD_ALLOWED_USERS: ""
  DISCORD_HOME_CHANNEL: ""
  SLACK_ALLOWED_USERS: ""
  SIGNAL_ALLOWED_USERS: ""
  SIGNAL_GROUP_ALLOWED_USERS: ""
  # Browser tools route through the standalone camofox Application
  # (k8s/applications/camofox.yaml) running in its own namespace. Camofox
  # handles interactive browsing (click/type/login); Firecrawl below
  # handles read-only scraping/crawling. Hermes' web tools auto-pick
  # whichever backend is appropriate per call.
  #
  # Known camofox limitation: ARIA combobox search bars (Mercado Livre,
  # Amazon, eBay, ...) get no ref — navigate directly to the search-
  # results URL instead of typing into nav search boxes.
  CAMOFOX_URL: http://camofox.camofox.svc.cluster.local:9377
  # Read-only web tools (web_search / web_extract / web_crawl) route through
  # the self-hosted Firecrawl deployed by k8s/applications/firecrawl.yaml.
  # Hermes prefers FIRECRAWL_API_URL over FIRECRAWL_API_KEY when both are set.
  FIRECRAWL_API_URL: http://firecrawl-api.firecrawl.svc.cluster.local:3002
  # Inference flows through the in-cluster LiteLLM proxy (OpenAI-compatible).
  OPENAI_BASE_URL: http://litellm.litellm.svc.cluster.local:4000/v1

extraEnv: []
extraEnvFrom: []

# Inline secrets unused — we load everything from 1Password via externalSecret.
secrets:
  existingSecret: ""
  annotations: {}

# All keys of the 1Password "hermes-env" item -> Secret -> envFrom.
# dataFrom.extract loads ALL keys generically (no per-key hardcoding).
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        annotations: {}
        labels: {}
  data: []
  dataFrom:
    - extract:
        key: hermes-env
  annotations: {}
  labels: {}

operator:
  enabled: false
  controllerClass: hermes.ai/default
  installCustomResources: true
  managementNamespace: ""
  defaultChartValues: {}
  tenants: []

tenant:
  id: hermes
  labels: {}

apiServer:
  enabled: true
  host: "0.0.0.0"
  port: 8642
  corsOrigins: ""
  modelName: hermes-agent

webhook:
  enabled: false
  port: 8644

telegramWebhook:
  enabled: false
  url: ""
  port: 8443

serviceAccount:
  create: true
  name: ""
  annotations: {}
  # Required so the agent can use its RBAC via the mounted SA token.
  automountServiceAccountToken: true

# Cluster read-only + delete pods.
rbac:
  create: true
  clusterWide: true
  annotations: {}
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["delete"]

persistence:
  enabled: true
  existingClaim: ""
  volumeName: state
  mountPath: /opt/data
  accessMode: ReadWriteOnce
  size: 20Gi
  storageClass: longhorn-ha
  annotations: {}

browser:
  shm:
    enabled: true
    mountPath: /dev/shm
    sizeLimit: 1Gi

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  sessionAffinity: None
  externalTrafficPolicy: ""
  internalTrafficPolicy: ""
  loadBalancerSourceRanges: []
  ports: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hermes.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  servicePortNumber: null

# Private VPN endpoint via the tailscale gateway. The instance enables this
# and sets hosts (its own domain).
virtualService:
  enabled: false
  gateways:
    - istio-system/tailscale
  hosts: []
  timeout: "3600s"
  servicePortNumber: 8642

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From the istio ingress gateway namespace to the API server.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 8642
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # LiteLLM proxy
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
      ports:
        - protocol: TCP
          port: 4000
    # Kube API server
    - ports:
        - protocol: TCP
          port: 443
    # General HTTPS/HTTP egress (GitHub, GHCR, web tools)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

tenantIsolation:
  enabled: true
  allowSameNamespace: true
  authorizedNamespaces: []
  allowDns: true
  additionalEgress: []
  podAntiAffinity:
    enabled: false
    type: preferredDuringSchedulingIgnoredDuringExecution
    topologyKey: kubernetes.io/hostname

pdb:
  enabled: true
  minAvailable: 1

probes:
  liveness: {}
  readiness: {}
  startup: {}

npmPackages: []

# Trimmed for the arm nodes (upstream 1Gi/4Gi was too heavy and got evicted).
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

terminationGracePeriodSeconds: 120

podAnnotations: {}
deploymentAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

priorityClassName: ""
runtimeClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# camofox now runs as its own Application (k8s/applications/camofox.yaml)
# in the camofox namespace, not as a hermes sidecar. The hermes pod talks
# to it via CAMOFOX_URL above.
extraContainers: []

# Files are synced into /opt/data/files dynamically at startup by the op-files
# init container (1Password Connect REST API — see extraInitContainers below).
# No filenames are configured anywhere; whatever attachments the hermes-files
# item has are downloaded by name.

extraVolumes: []
extraVolumeMounts: []
# git-login: authenticate gh + git once at startup using the token from the
# hermes-env secret, persisting credentials to HOME (/opt/data/home) so the
# bundled github skill's `gh auth status` path works and the (token-scrubbed)
# agent shell can still push. Reuses the hermes image (has gh/git).
extraInitContainers:
  - name: git-login
    image: ghcr.io/yurifrl/hermes-agent:latest
    imagePullPolicy: Always
    command:
      - /bin/sh
      - -ec
    args:
      - |
        set -eu
        export HOME=/opt/data/home
        mkdir -p "$HOME/.config/gh"
        TOKEN="${GH_TOKEN:-${GITHUB_TOKEN:-}}"
        if [ -z "$TOKEN" ]; then
          echo "git-login: no GH_TOKEN/GITHUB_TOKEN in hermes-env; skipping" >&2
          exit 0
        fi
        # gh refuses to persist creds while GH_TOKEN/GITHUB_TOKEN is set in env.
        unset GH_TOKEN GITHUB_TOKEN
        printf '%s' "$TOKEN" | gh auth login --with-token
        gh auth setup-git
        if [ -n "${GIT_AUTHOR_NAME:-}" ]; then git config --global user.name "$GIT_AUTHOR_NAME"; fi
        if [ -n "${GIT_AUTHOR_EMAIL:-}" ]; then git config --global user.email "$GIT_AUTHOR_EMAIL"; fi
        gh auth status
    envFrom:
      - secretRef:
          name: hermes-env
    volumeMounts:
      - name: state
        mountPath: /opt/data
      - name: tmp
        mountPath: /tmp
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  # op-files: download ALL file attachments of the 1Password "hermes-files"
  # item into /opt/data/files via the Connect REST API (fully dynamic, no
  # filenames). Reads the Connect token from the cluster's op-credentials
  # secret using the agent's existing cluster read RBAC.
  - name: op-files
    image: ghcr.io/yurifrl/hermes-agent:latest
    imagePullPolicy: Always
    command:
      - /bin/sh
      - -ec
    args:
      - |
        set -eu
        export HOME=/tmp
        if ! command -v op-files-sync >/dev/null 2>&1; then
          echo "op-files: op-files-sync not in image yet; skipping" >&2
          exit 0
        fi
        TOKEN=$(kubectl get secret -n 1password op-credentials -o jsonpath='{.data.token}' 2>/dev/null | base64 -d || true)
        if [ -z "$TOKEN" ]; then
          echo "op-files: cannot read Connect token (op-credentials); skipping" >&2
          exit 0
        fi
        OP_CONNECT_HOST=http://onepassword-connect.1password.svc.cluster.local:8080 \
        OP_CONNECT_TOKEN="$TOKEN" \
        OP_VAULT=kubernetes \
        OP_ITEM=hermes-files \
        OP_DEST=/opt/data/files \
        op-files-sync
    volumeMounts:
      - name: state
        mountPath: /opt/data
      - name: tmp
        mountPath: /tmp
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

extraObjects: []
