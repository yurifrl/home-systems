nameOverride: ""
fullnameOverride: ""

# home-systems image (built by .github/workflows/build-hermes.yaml).
image:
  repository: ghcr.io/yurifrl/hermes-agent
  tag: latest
  pullPolicy: Always

imagePullSecrets: []

replicaCount: 1
revisionHistoryLimit: 5

updateStrategy:
  type: RollingUpdate
podManagementPolicy: OrderedReady

command: []
args:
  - gateway
  - run
workingDir: /opt/hermes

bootstrap:
  enabled: true
  # Seed config.yaml/SOUL.md only if absent — preserve the persisted volume.
  overwrite: false
  existingConfigMap: ""
  configKey: config.yaml
  soulKey: SOUL.md

# Hermes config.yaml. Generic default — the lab's opinionated config.values
# (model/agent/terminal/browser/...) lives in k8s/applications/hermes.yaml.
config:
  raw: ""
  values: {}

soul:
  text: ""

# Non-secret env defaults. Secrets are loaded via the hermes-env ExternalSecret
# (envFrom). HOME is set automatically by the chart to <mountPath>/home.
env:
  WEB_TOOLS_DEBUG: "false"
  VISION_TOOLS_DEBUG: "false"
  MOA_TOOLS_DEBUG: "false"
  IMAGE_TOOLS_DEBUG: "false"
  HERMES_HUMAN_DELAY_MODE: "off"
  HERMES_HUMAN_DELAY_MIN_MS: "800"
  HERMES_HUMAN_DELAY_MAX_MS: "2500"
  GATEWAY_ALLOW_ALL_USERS: "false"
  WHATSAPP_ENABLED: "false"
  WHATSAPP_ALLOWED_USERS: ""
  TELEGRAM_ALLOWED_USERS: ""
  TELEGRAM_HOME_CHANNEL: ""
  DISCORD_ALLOWED_USERS: ""
  DISCORD_HOME_CHANNEL: ""
  SLACK_ALLOWED_USERS: ""
  SIGNAL_ALLOWED_USERS: ""
  SIGNAL_GROUP_ALLOWED_USERS: ""
  # Browser tools route through the standalone camofox Application
  # (k8s/applications/camofox.yaml) running in its own namespace. Camofox
  # handles interactive browsing (click/type/login); Firecrawl below
  # handles read-only scraping/crawling. Hermes' web tools auto-pick
  # whichever backend is appropriate per call.
  #
  # Known camofox limitation: ARIA combobox search bars (Mercado Livre,
  # Amazon, eBay, ...) get no ref — navigate directly to the search-
  # results URL instead of typing into nav search boxes.
  CAMOFOX_URL: http://camofox.camofox.svc.cluster.local:9377
  # Read-only web tools (web_search / web_extract / web_crawl) route through
  # the self-hosted Firecrawl deployed by k8s/applications/firecrawl.yaml.
  # Hermes prefers FIRECRAWL_API_URL over FIRECRAWL_API_KEY when both are set.
  FIRECRAWL_API_URL: http://firecrawl-api.firecrawl.svc.cluster.local:3002
  # Inference flows through the in-cluster LiteLLM proxy (OpenAI-compatible).
  OPENAI_BASE_URL: http://litellm.litellm.svc.cluster.local:4000/v1

extraEnv: []
extraEnvFrom: []

# Inline secrets unused — we load everything from 1Password via externalSecret.
secrets:
  existingSecret: ""
  annotations: {}

# All keys of the 1Password "hermes-env" item -> Secret -> envFrom.
# dataFrom.extract loads ALL keys generically (no per-key hardcoding).
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-env
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        annotations: {}
        labels: {}
  data: []
  dataFrom:
    - extract:
        key: hermes-env
  annotations: {}
  labels: {}

operator:
  enabled: false
  controllerClass: hermes.ai/default
  installCustomResources: true
  managementNamespace: ""
  defaultChartValues: {}
  tenants: []

tenant:
  id: hermes
  labels: {}

apiServer:
  enabled: true
  host: "0.0.0.0"
  port: 8642
  corsOrigins: ""
  modelName: hermes-agent

webhook:
  enabled: false
  port: 8644

telegramWebhook:
  enabled: false
  url: ""
  port: 8443

serviceAccount:
  create: true
  name: ""
  annotations: {}
  # Required so the agent can use its RBAC via the mounted SA token.
  automountServiceAccountToken: true

# Cluster read-only + delete pods.
rbac:
  create: true
  clusterWide: true
  annotations: {}
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["delete"]
    # Required for backup volume labeling
    - apiGroups: ["longhorn.io"]
      resources: ["volumes"]
      verbs: ["get", "list", "update", "patch"]


persistence:
  enabled: true
  existingClaim: ""
  volumeName: state
  mountPath: /opt/data
  accessMode: ReadWriteOnce
  size: 20Gi
  storageClass: longhorn-ha
  annotations: {}

  backup:
    enabled: false
    schedule: "0 2 * * 0"
    retain: 30
    concurrency: 1
    restore: ""  # Set to backup name to restore

browser:
  shm:
    enabled: true
    mountPath: /dev/shm
    sizeLimit: 1Gi

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  sessionAffinity: None
  externalTrafficPolicy: ""
  internalTrafficPolicy: ""
  loadBalancerSourceRanges: []
  ports: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hermes.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  servicePortNumber: null

# Private VPN endpoint via the tailscale gateway. The instance enables this
# and sets hosts (its own domain).
virtualService:
  enabled: false
  gateways:
    - istio-system/tailscale
  hosts: []
  timeout: "3600s"
  servicePortNumber: 8642

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From the istio ingress gateway namespace to the API server.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 8642
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # LiteLLM proxy
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
      ports:
        - protocol: TCP
          port: 4000
    # camofox browser server (k8s/applications/camofox.yaml, own namespace).
    # Was a hermes sidecar (no egress needed); now a separate Service reached
    # via CAMOFOX_URL — needs an explicit egress rule to :9377.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: camofox
      ports:
        - protocol: TCP
          port: 9377
    # 1Password Connect API (op-files init container syncs files via
    # onepassword-connect.1password.svc:8080). Without this the op-files
    # init container hangs on a blocked TCP connect and the pod never starts.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: 1password
      ports:
        - protocol: TCP
          port: 8080
    # Kube API server
    - ports:
        - protocol: TCP
          port: 443
    # General HTTPS/HTTP egress (GitHub, GHCR, web tools)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

tenantIsolation:
  enabled: true
  allowSameNamespace: true
  authorizedNamespaces: []
  allowDns: true
  additionalEgress: []
  podAntiAffinity:
    enabled: false
    type: preferredDuringSchedulingIgnoredDuringExecution
    topologyKey: kubernetes.io/hostname

pdb:
  enabled: true
  minAvailable: 1

probes:
  liveness: {}
  readiness: {}
  startup: {}

npmPackages: []

# Trimmed for the arm nodes (upstream 1Gi/4Gi was too heavy and got evicted).
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

terminationGracePeriodSeconds: 120

podAnnotations: {}
deploymentAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

priorityClassName: "platform-critical"
runtimeClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# camofox now runs as its own Application (k8s/applications/camofox.yaml)
# in the camofox namespace, not as a hermes sidecar. The hermes pod talks
# to it via CAMOFOX_URL above.
extraContainers: []

# Files are synced into /opt/data/files dynamically at startup by the
# `opFiles.enabled` chart-managed init container (1Password Connect REST
# API). No filenames are configured anywhere; whatever attachments the
# `opFiles.item` has are downloaded by name.

extraVolumes: []
extraVolumeMounts: []
extraInitContainers: []

sharedStorage:
  state:
    enabled: false
    create: false
    claimName: ""
    storageClass: ""
    accessMode: ReadWriteMany
    size: 20Gi
  workdir:
    enabled: false
    create: false
    claimName: ""
    storageClass: ""
    accessMode: ReadWriteMany
    size: 20Gi

repositorySync:
  enabled: false
  replicas: 1
  nodeSelector: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi

# memory-backup: curated, secret-free git backup of the HERMES_HOME allowlist
# (SOUL.md, config.yaml, memories/, skills/, cron/) to a private repo. A
# sidecar deployment runs `hctl backup` on `interval` with a SIGTERM final
# pass; the repo checkout lives in an emptyDir and is re-clonable. Full-state
# DR (secrets, DBs, caches) stays with the Longhorn volume snapshot.
# `restore.enabled` adds a StatefulSet init container that seeds a FRESH volume
# from the repo, guarded on `memories/` being absent (never clobbers live
# state). Requires auth.gitLogin.enabled. Private user/repo live in
# home-systems-values.
memoryBackup:
  enabled: false
  user: ""
  repo: hermes-memory
  branch: main
  interval: 1h
  dest: /backup
  restore:
    enabled: false
  nodeSelector: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi

pages:
  enabled: false
  replicas: 1
  image: busybox:1.38
  root: /workdir/site
  port: 8080
  nodeSelector: {}
  gateways: []
  hosts: []
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 32Mi

dashboard:
  enabled: false
  replicas: 1
  port: 9119
  nodeSelector: {}
  gateways: []
  hosts: []
  # Cross-container gateway liveness probe. Empty = derive from the gateway
  # Service (http://<fullname>:<apiServer.port>). The dashboard runs in its
  # own pod, so the local PID check can't see the gateway; it needs this HTTP
  # health probe to report the gateway as up.
  healthUrl: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

# ---------------------------------------------------------------------------
# Built-in init containers + sync sidecar (hctl-driven). All disabled by
# default so the chart stays portable; the home-systems Application turns
# them on for this lab.
# ---------------------------------------------------------------------------

# git-login: authenticate gh + git once at startup using the token from the
# external secret, persisting credentials to HOME so the (token-scrubbed)
# agent shell can still push. Backed by `hctl auth login`.
auth:
  gitLogin:
    enabled: false

# op-files: download every file attachment of a 1Password item into a path
# under /opt/data via the Connect REST API. Backed by `hctl op files sync`.
# `connectCredentialsSecret` is read with the agent's existing cluster-read
# RBAC; format is NS/NAME[:KEY] (default key: 'token').
opFiles:
  enabled: false
  host: http://onepassword-connect.1password.svc.cluster.local:8080
  vault: kubernetes
  item: hermes-files
  dest: /opt/data/files
  connectCredentialsSecret: 1password/op-credentials

# git-repos: clone a fixed list of GitHub repos into <mountPath>/<name> at
# startup, then run a periodic + on-exit pull/commit/push loop in a sidecar.
# Storage is `emptyDir` — repos are re-clonable from GitHub on every restart;
# the `syncInterval` cycle plus the SIGTERM-trapped final pass guarantee a
# backup commit before pod deletion. Backed by `hctl repos clone` + `hctl
# repos sync`. The actual `user`/`repos` list is private and lives in the
# home-systems-values repo (merged via $values/hermes/values.yaml).
gitRepos:
  enabled: false
  user: ""
  repos: []
  branch: main
  mountPath: /workdir
  syncInterval: 1h
  # Persist the cloned repos across pod restarts. When disabled (default) the
  # workdir is an emptyDir, so every restart re-clones every repo from scratch
  # — fine for small repos, painfully slow for large ones. When enabled, the
  # workdir is a PVC (volumeClaimTemplate), so repos-clone only does an
  # incremental fetch on restart, cutting deploy downtime dramatically.
  persistence:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi

