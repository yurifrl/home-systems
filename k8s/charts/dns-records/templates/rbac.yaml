{{- /*
external-dns instances that use the `crd` source but do NOT set crd.create
(so the bitnami chart doesn't grant them DNSEndpoint RBAC) need read access to
DNSEndpoint resources. The cloudflare instance has crd.create=true and already
gets this from the chart.
*/}}
{{- range .Values.dnsEndpointReaders | default (list) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dnsendpoint-reader-{{ . }}
rules:
  - apiGroups: ["externaldns.k8s.io"]
    resources: ["dnsendpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["externaldns.k8s.io"]
    resources: ["dnsendpoints/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dnsendpoint-reader-{{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dnsendpoint-reader-{{ . }}
subjects:
  - kind: ServiceAccount
    name: {{ . }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
