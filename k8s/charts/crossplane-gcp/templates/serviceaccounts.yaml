{{- $pc := .Values.providerConfig.name }}
{{- $dp := .Values.deletionPolicy }}
{{- range .Values.serviceAccounts }}
---
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccount
metadata:
  name: {{ .name }}
  annotations:
    # external-name for a ServiceAccount is its accountId (the unique part of
    # the SA email). Set it to import the existing SA.
    crossplane.io/external-name: {{ required "serviceAccount.accountId required" .accountId | quote }}
spec:
  deletionPolicy: {{ .deletionPolicy | default $dp }}
  providerConfigRef:
    name: {{ $pc }}
  forProvider:
    {{- with .displayName }}
    displayName: {{ . | quote }}
    {{- end }}
    {{- with .description }}
    description: {{ . | quote }}
    {{- end }}
{{- end }}
