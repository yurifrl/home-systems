{{- $pc := .Values.providerConfig.name }}
{{- $dp := .Values.deletionPolicy }}
{{- range .Values.buckets }}
---
apiVersion: storage.gcp.upbound.io/v1beta2
kind: Bucket
metadata:
  name: {{ .name }}
  annotations:
    # Import the EXISTING bucket instead of creating a new one.
    crossplane.io/external-name: {{ required "bucket.externalName required" .externalName | quote }}
spec:
  deletionPolicy: {{ .deletionPolicy | default $dp }}
  {{- with .managementPolicies }}
  # Drop "LateInitialize" to stop Crossplane importing live-bucket fields (e.g.
  # a retention policy set out-of-band) back into the spec, so forProvider is
  # authoritative and the provider clears anything not declared here.
  managementPolicies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  providerConfigRef:
    name: {{ $pc }}
  forProvider:
    location: {{ .location | quote }}
    {{- with .storageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
    {{- if hasKey . "forceDestroy" }}
    forceDestroy: {{ .forceDestroy }}
    {{- end }}
    {{- if hasKey . "uniformBucketLevelAccess" }}
    uniformBucketLevelAccess: {{ .uniformBucketLevelAccess }}
    {{- end }}
    {{- with .publicAccessPrevention }}
    publicAccessPrevention: {{ . | quote }}
    {{- end }}
    {{- with .cors }}
    cors:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .retentionPolicy }}
    retentionPolicy:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
