# ============================================================================
# PUBLIC placeholder values. These are intentionally fake.
# REAL values (bucket names/UUIDs, projectID, SA emails, WIF principals) live
# in the PRIVATE values repo and are merged at sync time via ArgoCD's
# multi-source $values mechanism. Never put real names here.
# ============================================================================

# GCP project + provider credentials wiring.
providerConfig:
  name: default
  # projectID is sensitive -> overridden from the private values repo.
  projectID: REPLACE_IN_PRIVATE_VALUES
  credentials:
    secretName: gcp-creds
    secretNamespace: crossplane-system
    key: creds

# Common deletion policy for imported resources. Use "Orphan" while importing
# existing infra so a mistake never deletes a live GCS bucket; flip to "Delete"
# once you trust reconciliation.
deletionPolicy: Orphan

# --- GCS buckets -----------------------------------------------------------
# externalName MUST equal the existing bucket name to IMPORT (not recreate) it.
buckets: []
#  - name: nixos-images            # k8s MR name (safe, non-secret)
#    externalName: REAL_BUCKET     # actual GCS bucket name (secret) -> private
#    location: us-east1
#    storageClass: ARCHIVE
#    forceDestroy: true
#    uniformBucketLevelAccess: false
#    publicAccessPrevention: inherited

# --- Service accounts ------------------------------------------------------
serviceAccounts: []
#  - name: foundry-sa
#    accountId: foundry-gcs-access-sa
#    displayName: Foundry GCS Access Service Account

# --- Service account keys (for external auth like VM, not Workload Identity) -
serviceAccountKeys: []
#  - name: victoriametrics-sa-key
#    serviceAccountRef: victoriametrics-sa
#    keyAlgorithm: KEY_ALG_RSA_2048
#    writeConnectionSecretToRef:
#      namespace: monitoring
#      name: victoriametrics-gcs-key

# --- HMAC keys (S3-interop credentials, e.g. Longhorn GCS backup target) ----
# Crossplane mints an HMAC key for the referenced SA and writes the secret to
# the connection secret (keys: access_id, secret). The accessId also appears in
# the MR status. Real entries live in the PRIVATE values repo.
hmacKeys: []
#  - name: longhorn-gcs-hmac
#    serviceAccountRef: longhorn-sa
#    state: ACTIVE
#    writeConnectionSecretToRef:
#      namespace: longhorn-system
#      name: longhorn-gcs-hmac

# --- Bucket IAM bindings (grants SAs access to buckets) ----------------------
bucketIAMMembers: []
#  - name: victoriametrics-bucket-admin
#    bucketRef: victoriametrics
#    role: roles/storage.admin
#    member: "serviceAccount:victoriametrics-gcs-sa@PROJECT_ID.iam.gserviceaccount.com"
#  # Cloud CDN backend-bucket private access (the OAC-equivalent): grant the
#  # global-LB service agent read on the bucket.
#  - name: board-games-assets-cdn-reader
#    bucketRef: board-games-assets
#    role: roles/storage.objectViewer
#    member: "serviceAccount:service-PROJECT_NUMBER@cloud-cdn-fill.iam.gserviceaccount.com"

# --- Assets CDN (global external HTTPS LB + Cloud CDN over the PRIVATE bucket) --
