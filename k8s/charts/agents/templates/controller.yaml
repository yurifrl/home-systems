{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agents-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-controller
    spec:
      serviceAccountName: agents-controller
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: [controller]
          env:
            - name: AGENTS_NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: AGENTS_AGENT_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            - name: AGENTS_SECRET_NAME
              value: {{ .Values.secretName | quote }}
            - name: AGENTS_IMAGE_PULL_SECRET
              value: {{ .Values.imagePullSecret | quote }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          resources: {{- toYaml .Values.controller.resources | nindent 12 }}
{{- end }}
