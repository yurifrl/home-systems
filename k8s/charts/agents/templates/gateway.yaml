{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: agents-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-gateway
    spec:
      serviceAccountName: agents-gateway
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: [gateway, --addr, ":{{ .Values.gateway.port }}"]
          env:
            - name: AGENTS_NAMESPACE
              value: {{ .Values.namespace | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: agents-gateway
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app.kubernetes.io/name: agents-gateway
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: http
{{- end }}
