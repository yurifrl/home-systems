# This is the main application that manages the actions-runner-controller
# https://github.com/actions/actions-runner-controller/blob/8b36ea90ebe81710fcdcb4f96424b43203d24f1e/charts/gha-runner-scale-set/templates/autoscalingrunnerset.yaml
# https://github.com/actions/actions-runner-controller/blob/master/docs/gha-runner-scale-set-controller/README.md
# https://docs.github.com/en/actions/hosting-your-own-runners/managing-self-hosted-runners-with-actions-runner-controller/quickstart-for-actions-runner-controller
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gha-runner
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: gha-runner
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: "*" 
      kind: AutoscalingListener
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          externalSecrets:
            - name: gha-runner-github-secret

    - chart: gha-runner-scale-set-controller
      repoURL: ghcr.io/actions/actions-runner-controller-charts
      targetRevision: "0.14.2"

    - chart: gha-runner-scale-set
      repoURL: ghcr.io/actions/actions-runner-controller-charts
      targetRevision: "0.14.2"
      helm:
        releaseName: gha-runner
        valuesObject:
          # Repo-scoped runners. NOTE: yurifrl is a personal GitHub user, not an
          # org, so org/account-level runners are impossible (/orgs/yurifrl
          # returns 404). Must target a specific repo.
          githubConfigUrl: https://github.com/yurifrl/obsidian
          githubConfigSecret: gha-runner-github-secret
          # Runner set name used in workflows (runs-on: syscd-runner).
          runnerScaleSetName: syscd-runner
          controllerServiceAccount:
            namespace: gha-runner
            name: gha-runner-gha-rs-controller
