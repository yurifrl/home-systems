apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyrra
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: pyrra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://rlex.github.io/helm-charts
      chart: pyrra
      targetRevision: "*"
      helm:
        valuesObject:
          extraKubernetesArgs:
            - --generic-rules
          # VictoriaMetrics single-node serves the Prometheus query API.
          prometheusUrl: "http://vmsingle-vmks.monitoring.svc.cluster.local:8428"
          dashboards:
            enabled: true
          serviceMonitor:
            # prometheus-operator CRDs are gone after the VM migration; the VM
            # operator scrapes via VMServiceScrape instead. Disabled to avoid a
            # hard dependency on monitoring.coreos.com. See follow-up issue.
            enabled: false
          prometheusRule:
            enabled: false
          validatingWebhookConfiguration:
            enabled: true
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
