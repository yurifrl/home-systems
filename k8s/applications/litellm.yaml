apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    # PUBLIC: the generic support chart (templates only). All litellm values —
    # including the model list / endpoints — come from the PRIVATE repo below,
    # merged at sync time, so they never appear in this public repo.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valueFiles:
          - $values/litellm/values.yaml
    # PRIVATE: real litellm values (model_list, endpoints). Repo creds already
    # registered in ArgoCD (shared with crossplane-gcp).
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values
