apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-gcp
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    # After the providers are installed and healthy.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      # ProviderConfig/MR CRDs are installed by the providers app; tolerate them
      # being briefly absent on first sync.
      - SkipDryRunOnMissingResource=true
  sources:
    # PUBLIC: the generic, value-free chart (templates only, fake placeholders).
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/crossplane-gcp
      helm:
        valueFiles:
          # Real bucket names / projectID / WIF principals come from the PRIVATE
          # repo source below, merged at sync time. Nothing secret in this repo.
          - $values/gcp/values.yaml
        valuesObject:
          # Assets CDN enabled. provider-gcp-compute's CRDs are scoped by the
          # gcp-compute-cdn MRAP (crossplane-providers) so only the LB/CDN/Cloud
          # Armor CRDs are active, not the full ~200. Real values in $values.
          assetsCdn:
            enabled: true
    # PRIVATE: holds the real values. Register repo creds in ArgoCD first
    # (see k8s/charts/crossplane-gcp/README.md).
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values
