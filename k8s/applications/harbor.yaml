apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: "1.17.0"
    helm:
      values: |
        # Harbor basic configuration
        externalURL: https://registry.syscd.live

        # Use Longhorn for persistence - minimal sizes for homelab
        persistence:
          enabled: true
          resourcePolicy: keep
          persistentVolumeClaim:
            registry:
              size: 5Gi
            jobservice:
              size: 500Mi
            database:
              size: 2Gi
            redis:
              size: 500Mi
            trivy:
              size: 2Gi

        # Database - use internal PostgreSQL
        database:
          internal:
            username: postgres
            password: changeme

        # Redis - use internal
        redis:
          internal:
            password: changeme

        # Disable unused components to save resources
        notary:
          enabled: false
        chartmuseum:
          enabled: false

        # Trivy scanner - minimal config
        trivy:
          enabled: true

        # Proxy cache - disabled
        proxy:
          enabled: false

        # Internal TLS disabled (handled by ingress)
        internalTLS:
          enabled: false

        # Metrics disabled
        metrics:
          enabled: false

        # Logging level
        logLevel: warn

        # Resource limits for homelab
        nginx:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        portal:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        core:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        jobservice:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        registry:
          controller:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
          registry:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  source:
    repoURL: https://github.com/yurifrl/home-systems.git
    targetRevision: HEAD
    path: k8s/charts/support
    helm:
      valuesObject:
        virtualServices:
          - name: harbor
            service:
              name: harbor-core
              namespace: harbor
              port: 80
