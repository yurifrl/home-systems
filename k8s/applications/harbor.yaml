apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: "1.17.0"
    helm:
      values: |
        # Harbor basic configuration
        externalURL: https://registry.syscd.live

        # Use Longhorn for persistence
        persistence:
          enabled: true
          resourcePolicy: keep
          persistentVolumeClaim:
            registry:
              size: 5Gi
            jobservice:
              size: 500Mi
            database:
              size: 2Gi
            redis:
              size: 500Mi
            trivy:
              size: 2Gi

        # Database with nodeSelector
        database:
          internal:
            username: postgres
            password: harborpassword123
          nodeSelector:
            kubernetes.io/arch: amd64

        # Redis with nodeSelector
        redis:
          internal:
            password: harborpassword123
          nodeSelector:
            kubernetes.io/arch: amd64

        # Disable unused components
        notary:
          enabled: false
        chartmuseum:
          enabled: false

        # Trivy with nodeSelector
        trivy:
          enabled: true
          nodeSelector:
            kubernetes.io/arch: amd64

        # Proxy cache
        proxy:
          enabled: false

        # Internal TLS
        internalTLS:
          enabled: false

        # Metrics
        metrics:
          enabled: false

        # Logging
        logLevel: warn

        # NGINX with nodeSelector
        nginx:
          nodeSelector:
            kubernetes.io/arch: amd64
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Portal with nodeSelector
        portal:
          nodeSelector:
            kubernetes.io/arch: amd64
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Core with nodeSelector
        core:
          nodeSelector:
            kubernetes.io/arch: amd64
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Jobservice with nodeSelector
        jobservice:
          nodeSelector:
            kubernetes.io/arch: amd64
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # Registry with nodeSelector
        registry:
          registry:
            nodeSelector:
              kubernetes.io/arch: amd64
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  source:
    repoURL: https://github.com/yurifrl/home-systems.git
    targetRevision: HEAD
    path: k8s/charts/support
    helm:
      valuesObject:
        virtualServices:
          - name: harbor
            service:
              name: harbor-core
              namespace: harbor
              port: 80
