apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    # Cluster CR comes up AFTER the operator+CRDs (cnpg-operator is at -2).
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: databases
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # Upstream CloudNativePG "cluster" chart (same repo as the operator chart).
    # It renders a CNPG `Cluster` CR (+ optional PodMonitor/PrometheusRule/
    # ScheduledBackup) from values. cluster-v0.6.1 is the current release.
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cluster
      targetRevision: "0.6.1"
      helm:
        # Pin the resource name to `pg` (otherwise it derives from the release
        # name). This is the CNPG Cluster name other apps connect to.
        valuesObject:
          fullnameOverride: pg

          # PostgreSQL major version.
          version:
            postgresql: "16"

          cluster:
            # 3 instances for HA: 1 primary + 2 streaming replicas across nodes
            # (CNPG manages replication + automatic failover). Requires >=3
            # schedulable nodes with healthy Longhorn so replicas land on
            # distinct healthy nodes (keep them off the flaky roaming VMs).
            instances: 3

            # Spread the 3 instances across distinct hosts. The CNPG default
            # uses topology.kubernetes.io/zone, but these bare-metal nodes have
            # no zone labels, so it can't spread (all replicas could pile on one
            # host = no HA). Use hostname; preferred so failover degrades
            # gracefully instead of wedging pods Pending.
            affinity:
              enablePodAntiAffinity: true
              podAntiAffinityType: preferred
              topologyKey: kubernetes.io/hostname
              # Keep replicas off macintel01/rpi01: those off-LAN nodes use their
              # remote-LAN IP as the node InternalIP, which the CP/LAN nodes
              # can't route back to (they must never --accept-routes), so pod
              # traffic to a replica there can't complete and Longhorn's CSI
              # never registers. The 5 reachable Longhorn nodes host replicas.
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values: [macintel01, rpi01]

            # PostgreSQL container image: the Supabase-extensions build
            # (home-systems-jfr.6) so this single cluster can also back Supabase.
            # Carries wal2json, pgjwt, pgsodium, pg_net, supabase_vault.
            imageName: ghcr.io/yurifrl/cnpg-postgres:16.10

            # Supabase needs these loaded at server start.
            postgresql:
              shared_preload_libraries:
                - pg_net
                - pgsodium

            # Declarative role management (reconciled by the operator, also on
            # an existing cluster). These are the LOGIN roles Supabase services
            # connect as; all share secret.db.password (the `supabase-db`
            # secret, key `password`). The roles are first CREATEd (NOLOGIN) in
            # initdb.postInitSQL below so grants resolve at bootstrap; this block
            # then makes them LOGIN and sets the password from the secret.
            roles:
              - name: supabase_admin
                ensure: present
                login: true
                superuser: true
                passwordSecret:
                  name: supabase-db
              - name: authenticator
                ensure: present
                login: true
                passwordSecret:
                  name: supabase-db
              - name: supabase_auth_admin
                ensure: present
                login: true
                createrole: true
                passwordSecret:
                  name: supabase-db
              - name: supabase_storage_admin
                ensure: present
                login: true
                createrole: true
                passwordSecret:
                  name: supabase-db
              - name: supabase_functions_admin
                ensure: present
                login: true
                createrole: true
                passwordSecret:
                  name: supabase-db
              # LiteLLM proxy's own login role. Password lives in the `litellm`
              # 1Password item; mirrored into the databases ns as `litellm-db`
              # (basic-auth) by an ExternalSecret in k8s/applications/litellm.yaml.
              - name: litellm
                ensure: present
                login: true
                passwordSecret:
                  name: litellm-db

            # initdb bootstrap (runs ONCE at cluster creation as superuser).
            # The existing `pg` cluster already bootstrapped, so applying this
            # needs a ONE-TIME recreate of the (empty) cluster.
            initdb:
              database: supabase
              owner: supabase_admin
              # Global roles (postgres db). CREATE NOLOGIN first so the GRANTs
              # resolve; the declarative `roles:` block above flips the admin
              # ones to LOGIN + sets their password from the secret.
              postInitSQL:
                - CREATE ROLE anon NOLOGIN NOINHERIT;
                - CREATE ROLE authenticated NOLOGIN NOINHERIT;
                - CREATE ROLE service_role NOLOGIN NOINHERIT BYPASSRLS;
                # authenticator + supabase_admin must exist before the GRANTs
                # below. supabase_admin is the initdb owner (CNPG creates it);
                # authenticator is created here (NOLOGIN now; the declarative
                # `roles:` block flips it to LOGIN + sets its password).
                - CREATE ROLE authenticator NOLOGIN NOINHERIT;
                - CREATE ROLE supabase_auth_admin NOLOGIN NOINHERIT CREATEROLE;
                - CREATE ROLE supabase_storage_admin NOLOGIN NOINHERIT CREATEROLE;
                - CREATE ROLE supabase_functions_admin NOLOGIN NOINHERIT CREATEROLE;
                - GRANT anon, authenticated, service_role TO authenticator;
                - GRANT anon, authenticated, service_role TO supabase_admin WITH ADMIN OPTION;
                - GRANT supabase_auth_admin, supabase_storage_admin, supabase_functions_admin TO supabase_admin WITH ADMIN OPTION;
              # Application DB (supabase): extensions + schemas + grants. Runs
              # as superuser on the supabase database. Service-specific tables
              # (auth.*, storage.*) are created by each service's own migrations
              # at startup; this just lays down the schemas they own + grants.
              postInitApplicationSQL:
                - CREATE SCHEMA IF NOT EXISTS extensions;
                - CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA extensions;
                - CREATE EXTENSION IF NOT EXISTS "uuid-ossp" WITH SCHEMA extensions;
                - CREATE EXTENSION IF NOT EXISTS pgjwt WITH SCHEMA extensions;
                - CREATE EXTENSION IF NOT EXISTS pgsodium;
                - CREATE EXTENSION IF NOT EXISTS pg_net WITH SCHEMA extensions;
                - CREATE SCHEMA IF NOT EXISTS auth AUTHORIZATION supabase_auth_admin;
                - CREATE SCHEMA IF NOT EXISTS storage AUTHORIZATION supabase_storage_admin;
                - CREATE SCHEMA IF NOT EXISTS realtime;
                - CREATE SCHEMA IF NOT EXISTS graphql_public;
                - GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
                - GRANT USAGE ON SCHEMA extensions TO anon, authenticated, service_role;
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO anon, authenticated, service_role;
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO anon, authenticated, service_role;
                - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO anon, authenticated, service_role;
                - GRANT ALL ON SCHEMA auth TO supabase_auth_admin;
                - GRANT ALL ON SCHEMA storage TO supabase_storage_admin;

            storage:
              storageClass: longhorn-ha
              size: 2Gi

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi

            monitoring:
              # Keep the metrics exporter ON (CNPG serves /metrics on :9187),
              # but DO NOT emit a Prometheus-Operator PodMonitor: this lab has
              # no monitoring.coreos.com CRDs (it runs the VictoriaMetrics
              # operator). A native VMPodScrape lives in the support-cluster
              # chart: k8s/charts/support-cluster/templates/monitoring/cnpg-vmpodscrape.yaml
              enabled: true
              podMonitor:
                enabled: false
              # Don't import the chart's default CNPG alert rules unreviewed;
              # the VM stack owns alerting. Flip on later if the alerts are wanted.
              prometheusRule:
                enabled: false

          # ---------------------------------------------------------------------
          # MANY DATABASES: additional logical DBs beyond `supabase` are each
          # their own declarative CNPG `Database` CR (one per DB) against this
          # single instance.
          # ---------------------------------------------------------------------
          databases:
            - name: litellm
              ensure: present
              owner: litellm
              databaseReclaimPolicy: retain

          # ---------------------------------------------------------------------
          # BACKUPS — OPEN DECISION (CNPG-native, self-contained, NO external GCS).
          # Left DISABLED so the Cluster is clean/valid today (a half-wired
          # backup target makes the Cluster unhealthy). Pick one, then enable:
          #   (i)  In-cluster MinIO as a Barman S3 target (preferred): deploy
          #        MinIO, then set backups.enabled=true, provider=s3,
          #        endpointURL=http://minio.minio.svc:9000, s3.bucket=cnpg,
          #        and point secret at MinIO creds; add a scheduledBackups entry.
          #   (ii) Longhorn CSI volume snapshots via a scheduledBackups entry
          #        with method=volumeSnapshot (no object store needed).
          # TODO(home-systems-jfr.4): choose (i) or (ii) and enable.
          # ---------------------------------------------------------------------
          backups:
            enabled: false
