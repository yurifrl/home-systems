apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agents
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
  sources:
    # Control plane (controller + gateway + workstrator + RBAC + CRD).
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/agents
    # Declarative secrets for the agents namespace, sourced from 1Password via
    # External Secrets Operator (never kubectl create secret / --from-literal).
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          externalSecrets:
            # The single "agents" item: every agent pod mounts this wholesale.
            # Requires a 1Password "agents" item (the one documented manual
            # prerequisite) with the fields referenced below.
            - name: agents
              data:
                - secretKey: ANTHROPIC_API_KEY
                  key: agents
                  property: ANTHROPIC_API_KEY
                - secretKey: OPENAI_API_KEY
                  key: agents
                  property: OPENAI_API_KEY
                - secretKey: GITHUB_TOKEN
                  key: agents
                  property: GITHUB_TOKEN
                - secretKey: GIT_AUTHOR_NAME
                  key: agents
                  property: GIT_AUTHOR_NAME
                - secretKey: GIT_AUTHOR_EMAIL
                  key: agents
                  property: GIT_AUTHOR_EMAIL
