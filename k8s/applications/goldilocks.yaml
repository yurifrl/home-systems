apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: goldilocks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    # The bundled VPA admission-controller cert hook (kept off below, but
    # guard anyway) and webhook caBundle are mutated at runtime.
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
  sources:
    # Fairwinds Goldilocks — recommends resource requests/limits and surfaces
    # them in a dashboard. https://github.com/FairwindsOps/goldilocks
    #
    # VPA is provided by Goldilocks' own bundled sub-chart (vpa.enabled=true)
    # so we run a single chart instead of a separate standalone VPA install.
    # We run the recommender ONLY (updater + admission-controller disabled):
    # Goldilocks needs recommendations, not auto-eviction/mutation of pods.
    - repoURL: https://charts.fairwinds.com/stable
      chart: goldilocks
      targetRevision: "10.3.0"
      helm:
        releaseName: goldilocks
        valuesObject:
          # Bundled Vertical Pod Autoscaler (recommender-only).
          vpa:
            enabled: true
            updater:
              enabled: false
            admissionController:
              enabled: false
            recommender:
              # Match the floors the previous standalone install used so tiny
              # home-lab workloads don't get unrealistically small targets.
              extraArgs:
                v: "4"
                pod-recommendation-min-cpu-millicores: 50
                pod-recommendation-min-memory-mb: 128
              resources:
                limits:
                  memory: 512Mi
                requests:
                  cpu: 50m
                  memory: 256Mi
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
          metrics-server:
            enabled: false

          # on-by-default: monitor EVERY namespace automatically. Goldilocks
          # creates recommendation-only (updateMode "Off") VPAs for all
          # workloads; opt a namespace OUT with the label
          #   goldilocks.fairwinds.com/enabled=false
          controller:
            enabled: true
            flags:
              on-by-default: true
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
          dashboard:
            enabled: true
            replicaCount: 1
            flags:
              on-by-default: true
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

    # Support chart: exposes the dashboard via Istio VirtualService
    # (goldilocks.syscd.*). Dashboard service is ClusterIP on port 80.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        releaseName: goldilocks-support
        valuesObject:
          virtualServices:
            - name: goldilocks
              service:
                name: goldilocks-dashboard
                namespace: goldilocks
                port: 80
