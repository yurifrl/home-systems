apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: goldilocks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    # Fairwinds Goldilocks — recommends resource requests/limits by reading
    # VPA recommendations and surfacing them in a dashboard.
    # https://github.com/FairwindsOps/goldilocks
    #
    # We DO NOT let Goldilocks bundle its own VPA: the cluster already runs a
    # standalone, better-tuned VPA install (k8s/applications/vertical-pod-autoscaler.yaml,
    # namespace `vpa`) with custom recommender args, control-plane tolerations
    # and ServiceMonitors managed by support-cluster. Goldilocks' chart ships
    # `vpa.enabled: false` by default (VPA is an opt-in sub-chart), so nothing
    # comes bundled and there is no duplicate VPA to remove — we simply reuse
    # the existing one.
    - repoURL: https://charts.fairwinds.com/stable
      chart: goldilocks
      targetRevision: "10.3.0"
      helm:
        releaseName: goldilocks
        valuesObject:
          # Reuse the existing standalone VPA in the `vpa` namespace.
          vpa:
            enabled: false
          metrics-server:
            enabled: false

          # Opt-in per namespace: label a namespace with
          #   goldilocks.fairwinds.com/enabled=true
          # to have Goldilocks create (recommendation-only, updateMode "Off")
          # VPAs for its workloads. We intentionally leave `on-by-default`
          # unset so we don't blanket the cluster with VPA objects.
          #
          # Note: the existing VPA updater runs with
          # --vpa-object-default-update-mode=Auto, but that only applies to
          # VPAs that omit an updateMode. Goldilocks always sets updateMode
          # explicitly ("Off"), so nothing here triggers auto-eviction.
          controller:
            enabled: true
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
          dashboard:
            enabled: true
            replicaCount: 1
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

    # Support chart: exposes the dashboard via Istio VirtualService
    # (goldilocks.syscd.*). Dashboard service is ClusterIP on port 80.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        releaseName: goldilocks-support
        valuesObject:
          virtualServices:
            - name: goldilocks
              service:
                name: goldilocks-dashboard
                namespace: goldilocks
                port: 80
