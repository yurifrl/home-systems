apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: goldilocks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # Fairwinds Goldilocks — recommends resource requests/limits and surfaces
    # them in a dashboard. https://github.com/FairwindsOps/goldilocks
    #
    # VPA is NOT bundled here: we reuse the standalone VPA install
    # (k8s/applications/vertical-pod-autoscaler.yaml, namespace `vpa`), which
    # is tuned and wired into monitoring. Goldilocks just reads its
    # recommendations.
    - repoURL: https://charts.fairwinds.com/stable
      chart: goldilocks
      targetRevision: "10.4.0"
      helm:
        releaseName: goldilocks
        valuesObject:
          # Reuse the external standalone VPA (namespace `vpa`).
          vpa:
            enabled: false
          metrics-server:
            enabled: false

          # on-by-default: monitor EVERY namespace automatically. Goldilocks
          # creates recommendation-only (updateMode "Off") VPAs for all
          # workloads; opt a namespace OUT with the label
          #   goldilocks.fairwinds.com/enabled=false
          controller:
            enabled: true
            flags:
              on-by-default: true
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
          dashboard:
            enabled: true
            replicaCount: 1
            flags:
              on-by-default: true
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

    # Support chart: exposes the dashboard via Istio VirtualService
    # (goldilocks.syscd.*). Dashboard service is ClusterIP on port 80.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        releaseName: goldilocks-support
        valuesObject:
          virtualServices:
            - name: goldilocks
              service:
                name: goldilocks-dashboard
                namespace: goldilocks
                port: 80
