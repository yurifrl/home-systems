apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supabase
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: supabase
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # 1) support chart: ExternalSecrets (1Password -> k8s) + the istio
    #    VirtualService. The ExternalSecrets pull from the `supabase` 1Password
    #    item (onepassword ClusterSecretStore) and produce the k8s secrets the
    #    supabase chart's secretRefs consume below.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          externalSecrets:
            - name: supabase-jwt
              namespace: supabase
              data:
                - secretKey: anonKey
                  key: supabase
                  property: anon-key
                - secretKey: serviceKey
                  key: supabase
                  property: service-key
                - secretKey: secret
                  key: supabase
                  property: jwt-secret
            - name: supabase-db
              namespace: supabase
              data:
                - secretKey: password
                  key: supabase
                  property: db-password
                - secretKey: database
                  key: supabase
                  property: db-database
            - name: supabase-dashboard
              namespace: supabase
              data:
                - secretKey: username
                  key: supabase
                  property: dashboard-username
                - secretKey: password
                  key: supabase
                  property: dashboard-password
            # CNPG declarative role passwords live in the `databases` namespace
            # (the pg cluster's ns) as a basic-auth secret. All Supabase login
            # roles share secret.db.password; postgres.yaml points each role's
            # passwordSecret at this `supabase-db` secret.
            - name: supabase-db-roles
              namespace: databases
              targetName: supabase-db
              template:
                type: kubernetes.io/basic-auth
                data:
                  username: supabase_admin
                  password: "{{ .password }}"
              data:
                - secretKey: password
                  key: supabase
                  property: db-password
            # CNPG validates passwordSecret.username == role name, so each
            # managed role needs its OWN basic-auth secret (same shared
            # password, different username). postgres.yaml points each role at
            # the matching secret below.
            - name: supabase-db-authenticator
              namespace: databases
              targetName: supabase-db-authenticator
              template:
                type: kubernetes.io/basic-auth
                data:
                  username: authenticator
                  password: "{{ .password }}"
              data:
                - secretKey: password
                  key: supabase
                  property: db-password
            - name: supabase-db-auth-admin
              namespace: databases
              targetName: supabase-db-auth-admin
              template:
                type: kubernetes.io/basic-auth
                data:
                  username: supabase_auth_admin
                  password: "{{ .password }}"
              data:
                - secretKey: password
                  key: supabase
                  property: db-password
            - name: supabase-db-storage-admin
              namespace: databases
              targetName: supabase-db-storage-admin
              template:
                type: kubernetes.io/basic-auth
                data:
                  username: supabase_storage_admin
                  password: "{{ .password }}"
              data:
                - secretKey: password
                  key: supabase
                  property: db-password
            - name: supabase-db-functions-admin
              namespace: databases
              targetName: supabase-db-functions-admin
              template:
                type: kubernetes.io/basic-auth
                data:
                  username: supabase_functions_admin
                  password: "{{ .password }}"
              data:
                - secretKey: password
                  key: supabase
                  property: db-password
          # CNPG also needs the db password as a secret in the databases
          # namespace (authenticator/supabase_admin passwordSecret). Mirror it.
          virtualServices:
            - name: supabase
              namespace: supabase
              host: supabase
              service:
                # kong is the single API gateway; service name = <release>-supabase-kong
                name: supabase-supabase-kong
                namespace: supabase
                port: 8000

    # 2) the forked Supabase chart (public OSS repo). DB is external -> CNPG.
    - repoURL: https://github.com/yurifrl/supabase-deploy.git
      targetRevision: HEAD
      path: chart
      helm:
        valuesObject:
          deployment:
            db:
              enabled: false   # external Postgres = the CNPG `pg` cluster
            # Home lab: single replica per service is plenty. Upstream defaults
            # to 2 for kong/realtime/rest, which just reserves idle capacity.
            kong:
              replicaCount: 1
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 1
                  memory: 1Gi
            realtime:
              replicaCount: 1
            rest:
              replicaCount: 1
          # studio mounts the functions PVC when persistence.functions.enabled
          # (default true), but that PVC is only created when the functions
          # deployment is enabled (it isn't) -> studio stuck Pending. Disable it.
          persistence:
            functions:
              enabled: false
          # DB host per service. The chart's init-db (pg_isready) and every
          # service read .Values.environment.<svc>.DB_HOST (default
          # postgres.example.com); secret.db.host below is NOT used for this.
          # Point them all at the CNPG primary service.
          environment:
            analytics:
              DB_HOST: pg-rw.databases.svc.cluster.local
            auth:
              DB_HOST: pg-rw.databases.svc.cluster.local
            functions:
              DB_HOST: pg-rw.databases.svc.cluster.local
            meta:
              DB_HOST: pg-rw.databases.svc.cluster.local
            realtime:
              DB_HOST: pg-rw.databases.svc.cluster.local
            rest:
              DB_HOST: pg-rw.databases.svc.cluster.local
            storage:
              DB_HOST: pg-rw.databases.svc.cluster.local
              # storage is Node.js and verifies the DB cert; CNPG serves a
              # self-signed cert -> SELF_SIGNED_CERT_IN_CHAIN. Keep TLS but skip
              # verification (traffic is also encrypted by istio ztunnel).
              DB_SSL: no-verify
          secret:
            jwt:
              secretRef: supabase-jwt
              secretRefKey:
                anonKey: anonKey
                serviceKey: serviceKey
                secret: secret
            db:
              # PostgREST/auth/etc connect here as the authenticator role.
              host: pg-rw.databases.svc.cluster.local
              port: 5432
              database: supabase
              secretRef: supabase-db
              secretRefKey:
                password: password
                database: database
            dashboard:
              secretRef: supabase-dashboard
              secretRefKey:
                username: username
                password: password
          # istio VirtualService (above) fronts kong; disable the chart's own
          # k8s Ingress.
          ingress:
            enabled: false
