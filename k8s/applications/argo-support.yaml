apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-support
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          virtualServices:
            - name: argocd
              service:
                name: argocd-server
                namespace: argocd
                port: 80

          # ArgoCD repository credential for the PRIVATE values repo
          # (git@github.com:yurifrl/home-systems-values.git), consumed by
          # hermes + crossplane-gcp. The SSH deploy key lives in 1Password
          # (item: argocd-home-systems-values, field: sshPrivateKey). The
          # rendered Secret MUST carry the argocd repository label so ArgoCD
          # recognizes it; without it ArgoCD falls back to a non-existent SSH
          # agent and every app sourcing this repo fails to render.
          externalSecrets:
            - name: argocd-home-systems-values
              namespace: argocd
              data:
                - secretKey: sshPrivateKey
                  key: argocd-home-systems-values
                  property: sshPrivateKey
              template:
                metadata:
                  labels:
                    argocd.argoproj.io/secret-type: repository
                data:
                  type: git
                  url: git@github.com:yurifrl/home-systems-values.git
                  sshPrivateKey: "{{ .sshPrivateKey }}"

