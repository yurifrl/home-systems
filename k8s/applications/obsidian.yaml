apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obsidian
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: obsidian
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
  sources:
    # linuxserver Obsidian (desktop-in-browser via KasmVNC). An init container
    # clones the private vault repo (git@github.com:yurifrl/Obsidian.git) into
    # /config/vaults/Obsidian using the GITHUB_TOKEN synced from 1Password.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          persistentVolumeClaims:
            - name: obsidian-config
              storage: 10Gi
              storageClassName: longhorn-single
          # Pulls GITHUB_TOKEN from the 1Password "obsidian" item (Kubernetes
          # vault) into a k8s Secret named "obsidian".
          externalSecrets:
            - name: obsidian
              data:
                - secretKey: GITHUB_TOKEN
                  key: obsidian
                  property: GITHUB_TOKEN
          deployments:
            - name: obsidian
              # Pin to pc01 (amd64, headroom); Obsidian's Electron/Chromium is
              # too heavy for the arm SBC workers.
              nodeSelector:
                kubernetes.io/hostname: pc01
              # Electron's Chromium sandbox needs an unconfined seccomp profile.
              securityContext:
                seccompProfile:
                  type: Unconfined
              volumes:
                - name: config
                  persistentVolumeClaim:
                    claimName: obsidian-config
                - name: dshm
                  emptyDir:
                    medium: Memory
                    sizeLimit: 1Gi
              containers:
                - name: obsidian
                  image: lscr.io/linuxserver/obsidian:latest
                  imagePullPolicy: Always
                  ports:
                    - name: http
                      containerPort: 3000
                      protocol: TCP
                  env:
                    - name: PUID
                      value: "1000"
                    - name: PGID
                      value: "1000"
                    - name: TZ
                      value: America/Sao_Paulo
                  volumeMounts:
                    - name: config
                      mountPath: /config
                    - name: dshm
                      mountPath: /dev/shm
                  resources:
                    requests:
                      cpu: 100m
                      memory: 512Mi
                    limits:
                      memory: 2Gi
                # Expose the Local REST API plugin (bound to 127.0.0.1:27124
                # inside the pod) on the pod network so in-cluster clients can
                # reach it. socat passes the plugin's TLS through untouched.
                - name: rest-api-proxy
                  image: alpine/socat:latest
                  args:
                    - TCP-LISTEN:27124,fork,reuseaddr
                    - TCP:127.0.0.1:27124
                  ports:
                    - name: rest-api
                      containerPort: 27124
                      protocol: TCP
                  resources:
                    requests:
                      cpu: 10m
                      memory: 16Mi
                    limits:
                      memory: 32Mi
                # Self-sync sidecar: commits + pushes vault edits back to git
                # and pulls remote changes, so the config volume stays in sync
                # with github.com/yurifrl/Obsidian. Tolerant of transient
                # failures (|| true) so a flaky network can't crash the pod.
                - name: vault-sync
                  image: alpine/git:latest
                  env:
                    - name: GITHUB_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: obsidian
                          key: GITHUB_TOKEN
                  command:
                    - sh
                    - -c
                    - |
                      VAULT=/config/vaults/Obsidian
                      git config --global --add safe.directory "$VAULT"
                      while true; do
                        if [ ! -d "$VAULT/.git" ]; then
                          mkdir -p "$VAULT"
                          git clone "https://oauth2:${GITHUB_TOKEN}@github.com/yurifrl/Obsidian.git" "$VAULT" || true
                        else
                          git -C "$VAULT" pull --rebase --autostash || true
                          git -C "$VAULT" add -A || true
                          if ! git -C "$VAULT" diff --cached --quiet; then
                            git -C "$VAULT" \
                              -c user.name=obsidian-sync \
                              -c user.email=obsidian-sync@local \
                              commit -m "auto: $(date -Iseconds)" || true
                            git -C "$VAULT" push || true
                          fi
                        fi
                        sleep 300
                      done
                  volumeMounts:
                    - name: config
                      mountPath: /config
                  resources:
                    requests:
                      cpu: 10m
                      memory: 32Mi
                    limits:
                      memory: 64Mi
          services:
            - name: obsidian
              port: 3000
            # Local REST API, proxied by the socat sidecar to the plugin.
            - name: obsidian-rest
              selector: obsidian
              port: 27124
              targetPort: 27124
          virtualServices:
            - name: obsidian
              service:
                name: obsidian
                namespace: obsidian
                port: 3000
