apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syscd-app-relay
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    # Same namespace as syscd-app so it reuses the existing 'ghcr' image pull
    # secret (the relay image is private, like syscd-app).
    namespace: syscd-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
  sources:
    # Stateless WebSocket relay that lets the ponto app drive the presentation
    # HTML slides (ghcr.io/yurifrl/syscd-app-relay, built by the relay CI).
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          deployments:
            - name: syscd-app-relay
              image:
                repository: ghcr.io/yurifrl/syscd-app-relay
                tag: latest
                pullPolicy: Always
              # Image is built amd64-only; pin to the amd64 control-plane node.
              nodeSelector:
                kubernetes.io/hostname: dell01
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
              containerPort: 8080
              readinessProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
          services:
            - name: syscd-app-relay
              port: 80
              targetPort: http
          virtualServices:
            - name: syscd-app-relay
              hosts:
                - present.syscd.live
              service:
                name: syscd-app-relay
                namespace: syscd-app
                port: 80
