apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # PRIVATE values: holds the slightly-sensitive backup target URL (bucket
    # name). Merged into the longhorn chart via valueFiles below.
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values
    # Support chart: creates the longhorn-backup-credentials ExternalSecret
    # (reshapes the Crossplane HMACKey connection secret into AWS_* keys).
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        # longhornBackupTarget.enabled + accessKeyId come from the PRIVATE repo.
        valueFiles:
          - $values/longhorn/support-values.yaml
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.12.0"
      helm:
        # backupTarget (bucket URL) comes from the PRIVATE values repo.
        valueFiles:
          - $values/longhorn/values.yaml
        values: |
          # Longhorn 1.8.x configuration for Talos Linux
          # Reference: https://longhorn.io/docs/1.8.0/advanced-resources/os-specific-specific/talos-linux-support/

          # Disable pre-upgrade checker job (avoids ArgoCD hook ordering bug
          # where the job runs before longhorn-service-account exists)
          preUpgradeChecker:
            jobEnabled: false

          # Enable Longhorn UI (for management)
          ui:
            enabled: true

          service:
            ui:
              type: ClusterIP

          # Resource settings (adjust for your cluster size)
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi

          # Default settings optimized for home lab / small cluster
          defaultSettings:
            # Data path - must match Talos kubelet mount
            defaultDataPath: /var/mnt/storage

            # Storage calculation
            storageMinimalAvailablePercentage: 25
            storageOverProvisioningPercentage: 100

            # Replica settings - set to 1 for 2-3 node home lab
            # WARNING: No redundancy at replica=1
            defaultReplicaCount: 1

            # Disable strict node affinity for small clusters
            replicaZoneSoftAntiAffinity: false
            replicaSoftAntiAffinity: true
            replicaDiskSoftAntiAffinity: true

            # Auto-balance replicas across nodes
            replicaAutoBalance: least-effort

            # Allow volume creation when degraded (only 1 node available)
            allowVolumeCreationWithDegradedAvailability: true

            # Snapshot and backup settings
            createDefaultDiskLabeledNodes: true

            # Upgrade checking
            upgradeChecker: false

            # Backup target: backupTarget (bucket URL) is set from the PRIVATE
            # values repo ($values/longhorn/values.yaml). Credentials come from
            # the longhorn-backup-credentials secret (built by the support chart
            # from the Crossplane HMACKey connection secret).
            backupTargetCredentialSecret: longhorn-backup-credentials

          # Persistence for Longhorn itself
          persistence:
            defaultClass: true
            defaultClassReplicaCount: 1

          # Enable monitoring
          monitoring:
            enabled: false  # Set true if you have Prometheus

          # Disable PSP for newer Kubernetes versions
          enablePSP: false

          # Longhorn manager settings
          longhornManager:
            logLevel: Info

          # Longhorn UI settings
          longhornUI: {}

          # Instance manager resources
          instanceManager:
            resources:
              limits:
                cpu: "1"
                memory: 2Gi
              requests:
                cpu: 500m
                memory: 512Mi

---
# StorageClass for replica=1 (development/testing only)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-single
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: ext4
  dataLocality: best-effort
reclaimPolicy: Delete
volumeBindingMode: Immediate
---
# StorageClass for replica=2 (minimal HA, requires 2+ nodes)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ha
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: driver.longhorn.io
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  fsType: ext4
  dataLocality: best-effort
reclaimPolicy: Delete
# Allow online PVC expansion (e.g. growing a StatefulSet volume in place).
allowVolumeExpansion: true
volumeBindingMode: Immediate
