apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vertical-pod-autoscaler
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: vpa
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: vertical-pod-autoscaler-admission-controller-cert
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: vpa-webhook-config
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
  source:
    chart: vertical-pod-autoscaler
    repoURL: ghcr.io/stevehipwell/helm-charts
    targetRevision: "*"
    helm:
      valuesObject:
        serviceMonitor:
          enabled: false
        recommender:
          extraArgs:
            - --pod-recommendation-min-cpu-millicores=50
            - --pod-recommendation-min-memory-mb=128
        updater:
          extraArgs:
            - --vpa-object-default-update-mode=Auto
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
        updater:
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
        admissionController:
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
