apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: support-cluster
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: support-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient      
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support-cluster

    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          virtualServices:
            - name: pyrra
              service:
                name: pyrra
                namespace: monitoring
                port: 9099
            - name: grafana
              service:
                name: vmks-grafana
                namespace: monitoring
                port: 80
            - name: prometheus
              service:
                name: vmsingle-vmks
                namespace: monitoring
                port: 8428
            - name: alertmanager
              service:
                name: vmalertmanager-vmks
                namespace: monitoring
                port: 9093
            - name: vmagent
              service:
                name: vmagent-vmks
                namespace: monitoring
                port: 8429
            - name: longhorn
              service:
                name: longhorn-frontend
                namespace: longhorn-system
                port: 80
