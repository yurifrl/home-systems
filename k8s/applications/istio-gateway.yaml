apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Wait=true
      - ResourcesHealth=true
  ignoreDifferences:
    - group: "*"
      kind: "*"
      managedFieldsManagers:
        - argocd-application-controller
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      targetRevision: "1.30.1"
      chart: gateway
      helm:
        # istio gateway chart 1.26.2 ships a values.schema.json that newer Helm
        # rejects (even defaults fail: '_internal_defaults_do_not_set'). Skip
        # schema validation so the chart renders and syncs.
        skipSchemaValidation: true
        valuesObject:
          service:
            annotations:
              tailscale.com/expose: "true"
              # Stable tailnet device name so *.syscd.tech doesn't break when the
              # gateway restarts. Without it the operator auto-numbers the device
              # (istio-system-istio-gateway-N) and the suffix bumps on re-register,
              # leaving the external-dns target (in support-cluster gateways.yaml)
              # pointing at a dead device. FQDN: syscd-gateway.tailcecc0.ts.net
              tailscale.com/hostname: "syscd-gateway"
            externalTrafficPolicy: Local
            type: LoadBalancer
            loadBalancerIP: "192.168.68.201"
