apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Wait=true
      - ResourcesHealth=true
  ignoreDifferences:
    - group: "*"
      kind: "*"
      managedFieldsManagers:
        - argocd-application-controller
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      targetRevision: "1.26.2"
      chart: gateway
      helm:
        # istio gateway chart 1.26.2 ships a values.schema.json that newer Helm
        # rejects (even defaults fail: '_internal_defaults_do_not_set'). Skip
        # schema validation so the chart renders and syncs.
        skipSchemaValidation: true
        valuesObject:
          # Pin to dell01: it is the only node on the 192.168.68.0/24 LAN, so
          # with externalTrafficPolicy: Local + MetalLB L2 the .201 VIP can only
          # be served from here. tp1/tp4 are tailscale-attached and break it.
          nodeSelector:
            kubernetes.io/hostname: dell01
          # dell01 is a control-plane node; tolerate its taint so the gateway
          # can run there (it is the only node on the LAN for MetalLB L2).
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          service:
            annotations:
              tailscale.com/expose: "true"
            externalTrafficPolicy: Local
            type: LoadBalancer
            loadBalancerIP: "192.168.68.201"
