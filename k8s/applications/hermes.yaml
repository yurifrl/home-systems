apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # PRIVATE values: env (Discord/WhatsApp identifiers — PII) + the
    # gitRepos.user/gitRepos.repos list. Lives in home-systems-values so the
    # repo list isn't public.
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values
    # App: the hermes chart. All container/init/sidecar wiring lives in the
    # chart itself (driven by structured values: auth.gitLogin, opFiles,
    # gitRepos). Inline shell blobs were replaced by the in-image `hctl` CLI.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/hermes
      helm:
        valueFiles:
          - $values/hermes/values.yaml
        valuesObject:
          # The chart's built-in VirtualService exposed the api-server (:8642)
          # at hermes.syscd.tech. The 'hermes' name now belongs to the web
          # dashboard (extraObjects below, across all TLD aliases), so disable
          # this one to avoid a host collision. The api-server stays reachable
          # in-cluster at hermes:8642 (Hermes Desktop's remote backend should
          # point at the dashboard URL anyway).
          virtualService:
            enabled: false

          # Pin to dell01 (amd64, has memory headroom; arm SBCs evict the pod).
          nodeSelector:
            kubernetes.io/hostname: dell01
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

          # Turn on the chart-managed plumbing for this lab.
          # The chart renders the corresponding init/sidecar containers
          # calling `hctl`. gitRepos.user + gitRepos.repos[] are merged
          # in from $values/hermes/values.yaml (private).
          persistence:
            backup:
              enabled: true
              schedule: "0 2 * * 0"
              retain: 14
          auth:
            gitLogin:
              enabled: true
          opFiles:
            enabled: true
          gitRepos:
            enabled: true
            # Persist /workdir so repos aren't re-cloned from scratch on every
            # pod roll (Obsidian alone is ~1GB; emptyDir made each deploy take
            # ~15min). longhorn-single: no HA replica needed, the repos are
            # re-clonable from GitHub. repos-sync keeps them fresh; repos-clone
            # only fetches deltas after the first clone.
            persistence:
              enabled: true
              storageClass: longhorn-single
              size: 15Gi

          # The chart's default NetworkPolicy only allows ingress to the
          # api-server (:8642). The extra sidecars below (hermes-pages :8080,
          # hermes-dashboard :9119) also receive traffic from the istio
          # gateway, so open those ports too — otherwise the gateway->pod hop
          # is dropped and the VirtualServices time out.
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: istio-system
                ports:
                  - protocol: TCP
                    port: 8642
                  - protocol: TCP
                    port: 8080
                  - protocol: TCP
                    port: 9119

          # hermes-pages: serve the cloned hermes-pages repo
          # (/workdir/hermes-pages, populated by repos-clone/repos-sync) as a
          # static site. busybox httpd, no config file, shares the gitRepos
          # workdir emptyDir. Exposed at hermes-pages.syscd.live (the
          # *.syscd.live wildcard already covers DNS + tunnel + gateway).
          extraContainers:
            - name: hermes-pages
              image: busybox:1.37
              command: ["httpd", "-f", "-v", "-p", "8080", "-h", "/workdir/hermes-pages"]
              ports:
                - name: pages
                  containerPort: 8080
              volumeMounts:
                - name: workdir
                  mountPath: /workdir
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  memory: 32Mi

            # hermes-dashboard: the web dashboard (+ Kanban tab) as a sidecar.
            # Separate process from the gateway; shares the /opt/data PVC so it
            # reads the same config, sessions, and kanban.db. Bound to 0.0.0.0
            # so the istio gateway can reach it; --insecure skips the dashboard's
            # own auth gate because hermes.syscd.live sits behind Cloudflare
            # Access (Google-capable SSO) at the edge. readOnlyRootFilesystem is
            # relaxed because the dashboard may build/cache its frontend.
            - name: hermes-dashboard
              image: ghcr.io/yurifrl/hermes-agent:latest
              imagePullPolicy: Always
              command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
              ports:
                - name: dashboard
                  containerPort: 9119
              env:
                - name: HERMES_HOME
                  value: /opt/data
                - name: HOME
                  value: /opt/data/home
              envFrom:
                - secretRef:
                    name: hermes-env
              volumeMounts:
                - name: state
                  mountPath: /opt/data
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi

          extraObjects:
            # Expose the busybox sidecar (:8080) on a dedicated Service.
            - apiVersion: v1
              kind: Service
              metadata:
                name: hermes-pages
              spec:
                selector:
                  app.kubernetes.io/name: hermes
                  app.kubernetes.io/instance: hermes
                ports:
                  - name: http
                    port: 80
                    targetPort: 8080
            # Route hermes-pages.syscd.live (public cloudflare gateway) to it.
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: hermes-pages
              spec:
                gateways:
                  - istio-system/dev
                  - istio-system/cloudflare
                  - istio-system/tailscale
                hosts:
                  - hermes-pages.syscd.live
                  - hermes-pages.syscd.tech
                  - hermes-pages.syscd.xyz
                  - hermes-pages.syscd.dev
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: hermes-pages
                          port:
                            number: 80
            # Expose the dashboard sidecar (:9119) on a dedicated Service.
            - apiVersion: v1
              kind: Service
              metadata:
                name: hermes-dashboard
              spec:
                selector:
                  app.kubernetes.io/name: hermes
                  app.kubernetes.io/instance: hermes
                ports:
                  - name: http
                    port: 80
                    targetPort: 9119
            # Route hermes.syscd.live (public cloudflare gateway, behind
            # Cloudflare Access) to the dashboard.
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: hermes-dashboard
              spec:
                gateways:
                  - istio-system/dev
                  - istio-system/cloudflare
                  - istio-system/tailscale
                hosts:
                  - hermes.syscd.live
                  - hermes.syscd.tech
                  - hermes.syscd.xyz
                  - hermes.syscd.dev
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: hermes-dashboard
                          port:
                            number: 80
