apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          # Secrets (1Password, Kubernetes vault):
          #   hermes-env   -> env vars (loaded via envFrom)
          #   hermes-files -> each field mounted as a file under /opt/data/files
          externalSecrets:
            - name: hermes-env
            - name: hermes-files
          statefulSets:
            - name: hermes
              serviceName: hermes
              # Built by .github/workflows/build-hermes.yaml and pushed to GHCR.
              # The GHCR package must be public, or add an imagePullSecret.
              volumeClaimTemplates:
                - name: state
                  accessModes:
                    - ReadWriteOnce
                  storage: 20Gi
                  storageClassName: longhorn-ha
              volumes:
                # Firefox/Camoufox needs more than the default 64Mi /dev/shm.
                - name: dshm
                  emptyDir:
                    medium: Memory
                    sizeLimit: 1Gi
                # Every key in the hermes-files secret becomes a file here.
                # optional: pod still starts if the item/secret doesn't exist yet.
                - name: hermes-files
                  secret:
                    secretName: hermes-files
                    optional: true
              containers:
                - name: hermes
                  image: ghcr.io/yurifrl/hermes-agent:latest
                  imagePullPolicy: Always
                  # /init (s6-overlay) is the image ENTRYPOINT; these are the args.
                  args: ["gateway", "run"]
                  ports:
                    - name: http
                      containerPort: 8642
                      protocol: TCP
                  env:
                    # HERMES_HOME defaults to /opt/data in the image; set
                    # explicitly for clarity. State persists on the Longhorn PVC.
                    - name: HERMES_HOME
                      value: /opt/data
                    # All inference flows through LiteLLM so the budget cap applies.
                    - name: OPENAI_BASE_URL
                      value: http://litellm.litellm.svc.cluster.local:4000/v1
                    # Route browser tools through the Camofox sidecar (same pod).
                    - name: CAMOFOX_URL
                      value: http://localhost:9377
                    # Persist gh/git auth on the volume (HOME=/root is ephemeral).
                    # Lets `gh auth login` survive restarts; agent's gh/git read
                    # the saved token file instead of the scrubbed GH_TOKEN env.
                    - name: GH_CONFIG_DIR
                      value: /opt/data/.config/gh
                    - name: GIT_CONFIG_GLOBAL
                      value: /opt/data/.gitconfig
                    # Plain config (non-secret). All SECRETS load via envFrom below.
                    - name: API_SERVER_HOST
                      value: "0.0.0.0"
                    - name: API_SERVER_PORT
                      value: "8642"
                  envFrom:
                    # Loads every key in the hermes-env secret as an env var.
                    - secretRef:
                        name: hermes-env
                  volumeMounts:
                    - name: state
                      mountPath: /opt/data
                    # Files from the hermes-files secret (certs, SA json, etc.).
                    - name: hermes-files
                      mountPath: /opt/data/files
                      readOnly: true
                  resources:
                    requests:
                      cpu: 100m
                      memory: 512Mi
                    limits:
                      cpu: "2"
                      memory: 2Gi
                # Camofox: browser-as-a-service sidecar (anti-detect Camoufox/Firefox).
                # Public multi-arch image; Hermes routes all browser tools here.
                - name: camofox
                  image: ghcr.io/jo-inc/camofox-browser:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                    - name: camofox
                      containerPort: 9377
                      protocol: TCP
                  env:
                    - name: CAMOFOX_PORT
                      value: "9377"
                    - name: MAX_OLD_SPACE_SIZE
                      value: "2048"
                  volumeMounts:
                    - name: dshm
                      mountPath: /dev/shm
                  resources:
                    requests:
                      cpu: 100m
                      memory: 512Mi
                    limits:
                      cpu: "2"
                      memory: 2Gi
          services:
            - name: hermes
              port: 8642
          virtualServices:
            # hermes.syscd.tech only (private VPN via tailscale gateway)
            - name: hermes
              domains:
                live: false
                tech: true
                xyz: false
                dev: false
              service:
                name: hermes
                namespace: hermes
                port: 8642
