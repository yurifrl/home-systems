apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # Private environment identifiers and git repository settings.
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values

    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/hermes
      helm:
        valueFiles:
          - $values/hermes/values.yaml
        valuesObject:
          virtualService:
            enabled: false

          nodeSelector:
            kubernetes.io/hostname: tp1

          persistence:
            existingClaim: hermes-state
            backup:
              enabled: true
              schedule: "0 2 * * 0"
              retain: 14

          auth:
            gitLogin:
              enabled: true
          opFiles:
            enabled: true

          gitRepos:
            enabled: false
            repos:
              - Obsidian
              - home-systems
              - home-systems-values
              - hermes-pages

          sharedStorage:
            state:
              enabled: true
              create: true
              claimName: hermes-state
              storageClass: longhorn
              accessMode: ReadWriteMany
              size: 20Gi
            workdir:
              enabled: true
              create: true
              claimName: repos
              storageClass: longhorn
              accessMode: ReadWriteMany
              size: 20Gi

          repositorySync:
            enabled: true

          pages:
            enabled: true
            root: /workdir/hermes-pages
            gateways:
              - istio-system/dev
              - istio-system/cloudflare
              - istio-system/tailscale
            hosts:
              - hermes-pages.syscd.live
              - hermes-pages.syscd.tech
              - hermes-pages.syscd.xyz
              - hermes-pages.syscd.dev

          dashboard:
            enabled: true
            gateways:
              - istio-system/dev
              - istio-system/cloudflare
              - istio-system/tailscale
            hosts:
              - hermes.syscd.live
              - hermes.syscd.tech
              - hermes.syscd.xyz
              - hermes.syscd.dev

          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: istio-system
                ports:
                  - protocol: TCP
                    port: 8642
