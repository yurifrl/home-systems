apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # PRIVATE values: env (Discord/WhatsApp identifiers — PII) + the
    # gitRepos.user/gitRepos.repos list. Lives in home-systems-values so the
    # repo list isn't public.
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values
   
    # App: the hermes chart. All container/init/sidecar wiring lives in the
    # chart itself (driven by structured values: auth.gitLogin, opFiles,
    # gitRepos). Inline shell blobs were replaced by the in-image `hctl` CLI.
    #
    # Topology: the StatefulSet runs ONLY the hermes agent so it starts
    # independent of everything else. Repos machinery (clone/sync), the web
    # dashboard, and the pages site live in the hermes-workers Deployment
    # (extraObjects below). The two workloads share state via RWX PVCs:
    #   hermes-state (/opt/data) and repos (/workdir).
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/hermes
      helm:
        valueFiles:
          - $values/hermes/values.yaml
        valuesObject:
          # The chart's built-in VirtualService exposed the api-server (:8642)
          # at hermes.syscd.tech. The 'hermes' name now belongs to the web
          # dashboard (extraObjects below, across all TLD aliases), so disable
          # this one to avoid a host collision. The api-server stays reachable
          # in-cluster at hermes:8642 (Hermes Desktop's remote backend should
          # point at the dashboard URL anyway).
          virtualService:
            enabled: false

          # Pin to dell01 (amd64 control-plane, has room again). State is RWX
          # so there is no volume-locality constraint; dell01 is the most
          # stable amd64 node with CPU/memory headroom.
          nodeSelector:
            kubernetes.io/hostname: dell01
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

          # State lives on a shared RWX PVC (extraObjects) instead of a
          # per-pod volumeClaimTemplate so hermes-workers (dashboard) can
          # mount the same data.
          persistence:
            existingClaim: hermes-state
            backup:
              enabled: true
              schedule: "0 2 * * 0"
              retain: 14
          auth:
            gitLogin:
              enabled: true
          opFiles:
            enabled: true

          # Repos machinery (clone init + sync sidecar) moved to the
          # hermes-workers Deployment so a slow clone or workdir volume
          # hiccup can never block the agent's startup. gitRepos.user comes
          # from $values/hermes/values.yaml (private); the repos list below
          # is consumed by hermes-workers via tpl.
          gitRepos:
            enabled: false
            repos:
              - Obsidian
              - home-systems
              - home-systems-values
              - hermes-pages

          # The agent still reads/writes the cloned repos; mount the shared
          # RWX workdir directly (populated by hermes-workers).
          extraVolumes:
            - name: workdir
              persistentVolumeClaim:
                claimName: repos
          extraVolumeMounts:
            - name: workdir
              mountPath: /workdir

          # Only the api-server (:8642) lives in this pod now; dashboard and
          # pages moved to hermes-workers (not covered by this chart policy).
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: istio-system
                ports:
                  - protocol: TCP
                    port: 8642

          extraObjects:
            # Shared state (/opt/data): agent writes, dashboard reads.
            # RWX via Longhorn share-manager (same mechanism as `repos`).
            - apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: hermes-state
              spec:
                accessModes:
                  - ReadWriteMany
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 20Gi
            # Shared workdir (/workdir): hermes-workers clones/syncs the
            # repos, the agent and pages consume them.
            - apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: repos
              spec:
                accessModes:
                  - ReadWriteMany
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 20Gi

            # hermes-workers: everything that is not the agent. Crashes or
            # slow starts here never block hermes-0.
            - apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: hermes-workers
              spec:
                replicas: 1
                strategy:
                  type: Recreate
                selector:
                  matchLabels:
                    app: hermes-workers
                template:
                  metadata:
                    labels:
                      app: hermes-workers
                  spec:
                    nodeSelector:
                      kubernetes.io/hostname: dell01
                    tolerations:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
                        effect: NoSchedule
                    volumes:
                      - name: state
                        persistentVolumeClaim:
                          claimName: hermes-state
                      - name: workdir
                        persistentVolumeClaim:
                          claimName: repos
                      - name: tmp
                        emptyDir: {}
                    initContainers:
                      # ponytail: depends on git-login (hermes-0 init) having
                      # written credentials into hermes-state/home at least once.
                      - name: repos-clone
                        image: ghcr.io/yurifrl/hermes-agent:latest
                        imagePullPolicy: Always
                        command:
                          - hctl
                          - repos
                          - clone
                          - --user={{ .Values.gitRepos.user }}
                          - '--repos={{ join "," .Values.gitRepos.repos }}'
                          - --branch=main
                          - --dest=/workdir
                        env:
                          - name: HOME
                            value: /opt/data/home
                        envFrom:
                          - secretRef:
                              name: hermes-env
                        volumeMounts:
                          - name: state
                            mountPath: /opt/data
                          - name: workdir
                            mountPath: /workdir
                          - name: tmp
                            mountPath: /tmp
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
                    containers:
                      - name: repos-sync
                        image: ghcr.io/yurifrl/hermes-agent:latest
                        imagePullPolicy: Always
                        command:
                          - hctl
                          - repos
                          - sync
                          - --dir=/workdir
                          - --interval=1h
                        env:
                          - name: HOME
                            value: /opt/data/home
                        envFrom:
                          - secretRef:
                              name: hermes-env
                        volumeMounts:
                          - name: state
                            mountPath: /opt/data
                          - name: workdir
                            mountPath: /workdir
                          - name: tmp
                            mountPath: /tmp
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
                        resources:
                          requests:
                            cpu: 25m
                            memory: 64Mi
                          limits:
                            memory: 256Mi
                      # Serve the cloned hermes-pages repo as a static site at
                      # hermes-pages.syscd.live.
                      - name: hermes-pages
                        image: busybox:1.37
                        command: ["httpd", "-f", "-v", "-p", "8080", "-h", "/workdir/hermes-pages"]
                        ports:
                          - name: pages
                            containerPort: 8080
                        volumeMounts:
                          - name: workdir
                            mountPath: /workdir
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
                        resources:
                          requests:
                            cpu: 10m
                            memory: 16Mi
                          limits:
                            memory: 32Mi
                      # Web dashboard (+ Kanban). Reads the agent's config,
                      # sessions and kanban.db from the shared state PVC.
                      # --insecure is fine: hermes.syscd.live sits behind
                      # Cloudflare Access at the edge.
                      - name: hermes-dashboard
                        image: ghcr.io/yurifrl/hermes-agent:latest
                        imagePullPolicy: Always
                        command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
                        ports:
                          - name: dashboard
                            containerPort: 9119
                        env:
                          - name: HERMES_HOME
                            value: /opt/data
                          - name: HOME
                            value: /opt/data/home
                        envFrom:
                          - secretRef:
                              name: hermes-env
                        volumeMounts:
                          - name: state
                            mountPath: /opt/data
                          - name: tmp
                            mountPath: /tmp
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: false
                          capabilities:
                            drop:
                              - ALL
                          seccompProfile:
                            type: RuntimeDefault
                        resources:
                          requests:
                            cpu: 50m
                            memory: 128Mi
                          limits:
                            memory: 512Mi

            # Expose the pages container (:8080) on a dedicated Service.
            - apiVersion: v1
              kind: Service
              metadata:
                name: hermes-pages
              spec:
                selector:
                  app: hermes-workers
                ports:
                  - name: http
                    port: 80
                    targetPort: 8080
            # Route hermes-pages.syscd.live (public cloudflare gateway) to it.
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: hermes-pages
              spec:
                gateways:
                  - istio-system/dev
                  - istio-system/cloudflare
                  - istio-system/tailscale
                hosts:
                  - hermes-pages.syscd.live
                  - hermes-pages.syscd.tech
                  - hermes-pages.syscd.xyz
                  - hermes-pages.syscd.dev
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: hermes-pages
                          port:
                            number: 80
            # Expose the dashboard (:9119) on a dedicated Service.
            - apiVersion: v1
              kind: Service
              metadata:
                name: hermes-dashboard
              spec:
                selector:
                  app: hermes-workers
                ports:
                  - name: http
                    port: 80
                    targetPort: 9119
            # Route hermes.syscd.live (public cloudflare gateway, behind
            # Cloudflare Access) to the dashboard.
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: hermes-dashboard
              spec:
                gateways:
                  - istio-system/dev
                  - istio-system/cloudflare
                  - istio-system/tailscale
                hosts:
                  - hermes.syscd.live
                  - hermes.syscd.tech
                  - hermes.syscd.xyz
                  - hermes.syscd.dev
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: hermes-dashboard
                          port:
                            number: 80
