apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/hermes
      helm:
        # Only what makes THIS instance mine — everything else is chart defaults.
        valuesObject:
          # Private hostname behind the tailscale gateway.
          virtualService:
            enabled: true
            hosts:
              - hermes.syscd.tech

          # Pin to dell01 (amd64, has memory headroom; arm SBCs evict the pod).
          nodeSelector:
            kubernetes.io/hostname: dell01
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
