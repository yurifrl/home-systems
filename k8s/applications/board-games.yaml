apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: board-games
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: board-games
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
  sources:
    # PRIVATE: real values (image owner, gitSync repo/subPath) for the bg chart.
    - repoURL: git@github.com:yurifrl/home-systems-values.git
      targetRevision: HEAD
      ref: values
    # App: public board-games chart (Deployment/Service/PVC/ConfigMap).
    - repoURL: https://github.com/yurifrl/board-games.git
      targetRevision: HEAD
      path: chart
      helm:
        releaseName: board-games
        valueFiles:
          - $values/board-games/values.yaml
    # Cluster glue: ExternalSecret (1Password) + istio VirtualService.
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          externalSecrets:
            - name: board-games
          virtualServices:
            - name: board-games
              hosts:
                - bg.syscd.live
                - bg.syscd.tech
                - bg.monaddaydream.com
                - jogosdetabuleirodoyuri.com.br
              service:
                name: board-games
                namespace: board-games
                port: 8080
