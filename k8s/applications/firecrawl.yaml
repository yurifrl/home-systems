apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firecrawl
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: firecrawl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  sources:
    # Forked from upstream firecrawl/firecrawl/examples/kubernetes/firecrawl-helm
    # at commit 42b46be4f75a (see k8s/charts/firecrawl/.upstream-sha). Only
    # divergence from upstream: 6 heavy deployments now respect a
    # `global.{nodeSelector,tolerations}` block (set below) so we can pin
    # them to dell01. To resync from upstream: re-fetch the templates,
    # re-apply the `global` block patches in the 6 deployments, bump the
    # SHA file. Service ends up at:
    #   http://firecrawl-api.firecrawl.svc.cluster.local:3002
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/firecrawl
      helm:
        releaseName: firecrawl
        valuesObject:
          # Pin the heavy firecrawl pods to dell01 (amd64, plenty of RAM).
          # The arm64 SBCs (tp1/tp4) OOMed when the chart's default
          # resource limits stacked up on them. Stateful pods
          # (rabbitmq/postgres/redis) are NOT pinned and stay where the
          # scheduler puts them — they're stable on tp4.
          global:
            nodeSelector:
              kubernetes.io/hostname: dell01
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

          # Make service names readable: firecrawl-api / firecrawl-redis / etc
          # instead of firecrawl-firecrawl-api.
          fullnameOverride: firecrawl

          # Slim the deploy: drop nuqWorker replicas from 5 to 1. Keep
          # extractWorker and nuqPrefetchWorker on — prefetch is the
          # dispatcher that pulls from nuq.queue_scrape and feeds nuq-worker;
          # disabling it leaves jobs queued forever (408 timeouts on /scrape).
          nuqWorker:
            replicaCount: 1

          # Ephemeral storage everywhere. Pod restart wipes queues + Postgres
          # job history; in-flight crawls die, no long-term data is lost.
          nuqPostgres:
            persistence:
              enabled: false

          # Don't pull a "docker-registry-secret" the chart references by
          # default for private images. We use the public ghcr/dockerhub
          # tags below.
          imagePullSecrets: []
          image:
            dockerSecretEnabled: false
