# Minimal MQTT broker for zigbee2mqtt (and Home Assistant), via the support chart.
# The former TrueCharts chart (tccr.io/truecharts/mosquitto) was removed upstream
# when TrueCharts shut down its public registry, so this deploys the official
# eclipse-mosquitto image. Its entrypoint already runs `mosquitto -c
# /mosquitto/config/mosquitto.conf`, so mounting our ConfigMap there is enough.
# Dropped vs the old chart: websockets VirtualService + mqtt-exporter. Re-add if needed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosquitto
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: mosquitto
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          configMaps:
            - name: mosquitto-config
              data:
                mosquitto.conf: |
                  listener 1883
                  allow_anonymous true
                  persistence false
          deployments:
            - name: mosquitto
              image:
                repository: eclipse-mosquitto
                tag: "2"
                pullPolicy: IfNotPresent
              containerPort: 1883
              volumes:
                - name: config
                  configMap:
                    name: mosquitto-config
              volumeMounts:
                - name: config
                  mountPath: /mosquitto/config
          services:
            - name: mosquitto
              port: 1883
              targetPort: http
