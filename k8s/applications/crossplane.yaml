apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: "2.3.3"
    helm:
      valuesObject:
        # NOTE: the `default` ManagedResourceActivationPolicy (narrowed from the
        # ["*"] crossplane bootstraps) is NOT settable from this chart's values —
        # the deployment args are just ["core","start"]. It is owned as an explicit
        # manifest in k8s/charts/crossplane-providers (default-mrap.yaml), which
        # Argo server-side-applies and self-heals.
        resourcesCrossplane:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        resourcesRBACManager:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        metrics:
          enabled: true
        # Enable XFN (Composition Functions) for advanced composition logic
        xfn:
          enabled: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
