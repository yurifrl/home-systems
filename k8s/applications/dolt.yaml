apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dolt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: dolt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        istio.io/dataplane-mode: ambient
  sources:
    - repoURL: https://github.com/yurifrl/home-systems.git
      targetRevision: HEAD
      path: k8s/charts/support
      helm:
        valuesObject:
          externalSecrets:
            - name: dolt
          services:
            - name: dolt
              port: 3306
              targetPort: 3306
          virtualServices:
            - name: dolt
              service:
                name: dolt
                namespace: dolt
                port: 3306
          statefulSets:
            - name: dolt
              replicas: 1
              containers:
                - name: dolt
                  image: dolthub/dolt-sql-server:latest
                  ports:
                    - name: http
                      containerPort: 3306
                      protocol: TCP
                  env:
                    - name: DOLT_ROOT_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: dolt
                          key: password
                    - name: DOLT_ROOT_HOST
                      value: "%"
                  volumeMounts:
                    - name: data
                      mountPath: /var/lib/dolt
              volumeClaimTemplates:
                - name: data
                  accessModes:
                    - ReadWriteOnce
                  storageClassName: longhorn
                  storage: 2Gi
